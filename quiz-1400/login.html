<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>청각장애인 요양보호사 자격시험 대비: 1400題 로그인</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #005D7A;
      --primary-light: #0E8FB2;
      --text-primary: #162230;
      --text-secondary: #4A5D71;
      --text-muted: #71839A;
      --border: #C6D3DE;
      --surface: #FFFFFF;
      --success: #0F8A4C;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text-primary);
      background: linear-gradient(140deg, #063F57 0%, #005D7A 46%, #0E8FB2 100%);
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(20px, 4vw, 48px);
      position: relative;
      overflow: hidden;
    }

    .page::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 18% 18%, rgba(255, 255, 255, 0.16) 0%, transparent 34%),
        radial-gradient(circle at 80% 74%, rgba(255, 255, 255, 0.12) 0%, transparent 36%);
      pointer-events: none;
    }

    .login-card {
      position: relative;
      z-index: 1;
      width: min(560px, 94vw);
      padding: clamp(32px, 5vw, 58px);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.13);
      border: 1px solid rgba(255, 255, 255, 0.35);
      box-shadow: 0 24px 58px rgba(4, 24, 39, 0.34);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      text-align: center;
    }

    .badge {
      display: inline-block;
      padding: 7px 18px;
      margin-bottom: 22px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.34);
      color: #F4FBFF;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 1.5px;
    }

    h1 {
      color: #FFFFFF;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.3;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .part-title {
      color: rgba(237, 250, 255, 0.86);
      font-size: clamp(16px, 2vw, 22px);
      font-weight: 700;
      margin-bottom: 28px;
    }

    .part-grid {
      display: none;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }

    .part-grid.visible {
      display: grid;
    }

    .part-btn {
      min-height: 74px;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.94);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 15px;
      font-weight: 800;
      line-height: 1.35;
      cursor: pointer;
    }

    .part-btn.active {
      background: #FFFFFF;
      color: var(--primary);
      box-shadow: 0 8px 18px rgba(4, 24, 39, 0.22);
    }

    .input-group {
      margin-bottom: 13px;
    }

    input {
      width: 100%;
      padding: 16px 18px;
      border: 2px solid transparent;
      border-radius: 12px;
      outline: none;
      background: rgba(255, 255, 255, 0.96);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 16px;
    }

    input::placeholder {
      color: var(--text-muted);
    }

    input:focus {
      border-color: rgba(255, 255, 255, 0.86);
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.20);
    }

    .submit-btn {
      width: 100%;
      margin-top: 8px;
      padding: 16px;
      border: none;
      border-radius: 12px;
      background: #FFFFFF;
      color: var(--primary);
      font-family: inherit;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(2, 32, 48, 0.20);
    }

    .hint {
      margin-top: 18px;
      color: rgba(237, 250, 255, 0.78);
      font-size: 13px;
      line-height: 1.5;
    }

    @media (max-width: 560px) {
      .page {
        align-items: flex-start;
        padding: 22px 14px;
      }

      .login-card {
        padding: 30px 22px;
      }

      .part-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="login-card">
      <div class="badge">1400題</div>
      <h1>1400제 로그인</h1>
      <p class="part-title" id="part-title"></p>
      <div class="part-grid" id="part-grid"></div>
      <div class="input-group">
        <input type="text" id="user-id" autocomplete="username" placeholder="아이디" />
      </div>
      <div class="input-group">
        <input type="text" id="user-name" autocomplete="name" placeholder="이름" />
      </div>
      <button class="submit-btn" id="start-btn">학습 시작 →</button>
      <p class="hint">접속 기기에 맞춰 데스크톱용 또는 모바일용 1400제 파일로 자동 이동합니다.</p>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-database.js"></script>
  <script>
    const PARTS = {
      1: "1부. 요양보호와 인권",
      2: "2부. 노화와 건강증진",
      3: "3부. 요양보호와 생활지원",
      4: "4부. 상황별 요양보호 기술"
    };
    const firebaseConfig = {
      apiKey: "AIzaSyBHGrV9HdcT49KUYcEUn_VVZJVpRAfFdqc",
      authDomain: "deaf-for-database-develo-59bf8.firebaseapp.com",
      databaseURL: "https://deaf-for-database-develo-59bf8-default-rtdb.firebaseio.com",
      projectId: "deaf-for-database-develo-59bf8",
      storageBucket: "deaf-for-database-develo-59bf8.appspot.com",
      messagingSenderId: "736560751604",
      appId: "1:736560751604:web:4c79c46dff876a6187af8c"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const params = new URLSearchParams(location.search);
    const pathPartMatch = location.pathname.match(/login-(\d{1,2})\.html$/);
    let selectedPart = parseInt(params.get("part") || (pathPartMatch && pathPartMatch[1]) || "", 10);
    if (!PARTS[selectedPart]) selectedPart = 0;

    const partTitle = document.getElementById("part-title");
    const partGrid = document.getElementById("part-grid");
    const idInput = document.getElementById("user-id");
    const nameInput = document.getElementById("user-name");

    function renderPartState() {
      partTitle.textContent = selectedPart ? PARTS[selectedPart] : "학습할 부를 선택해주세요.";
      partGrid.classList.toggle("visible", !selectedPart);
      partGrid.innerHTML = "";
      if (selectedPart) return;
      Object.entries(PARTS).forEach(([part, title]) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "part-btn";
        button.textContent = title;
        button.addEventListener("click", () => {
          selectedPart = parseInt(part, 10);
          renderPartState();
        });
        partGrid.appendChild(button);
      });
    }

    function isMobileOrTablet() {
      const ua = navigator.userAgent || "";
      const uaMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua);
      const touchTablet = navigator.maxTouchPoints > 1 && window.matchMedia("(max-width: 1366px)").matches;
      return uaMobile || touchTablet;
    }

    function normalizeUserNameForIdentity(name) {
      return String(name || "").trim().replace(/\s+/g, " ");
    }

    function getAuthorizationErrorMessage(error) {
      if (error && error.code === "invalid-uid") return "아이디에는 . # $ [ ] / 문자를 사용할 수 없습니다.";
      if (error && error.code === "not-registered") return "등록되지 않은 아이디입니다. 관리자에게 문의해 주세요.";
      if (error && error.code === "disabled") return "사용이 중지된 아이디입니다. 관리자에게 문의해 주세요.";
      if (error && error.code === "name-mismatch") return "아이디와 이름이 등록 정보와 일치하지 않습니다. 다시 확인해 주세요.";
      if (error && error.code === "scope-denied") return "이 학습자는 해당 1400제 부에 등록되어 있지 않습니다. 관리자에게 문의해 주세요.";
      return "등록 정보를 확인하지 못했습니다. 잠시 후 다시 시도해 주세요.";
    }

    function hasAuthorizedQuiz1400Scope(data) {
      const scopes = (data && data.allowedScopes && data.allowedScopes.quiz1400) || {};
      return Boolean(data && data.enabled !== false && (scopes.all === true || scopes["part" + selectedPart] === true));
    }

    function verifyAuthorizedUser(uid, name) {
      const normalized = normalizeUserNameForIdentity(name);
      if (/[.#$\[\]\/]/.test(String(uid || ""))) { const err = new Error("invalid uid"); err.code = "invalid-uid"; return Promise.reject(err); }
      return database.ref("authorizedUsers/" + uid).once("value").then(snapshot => {
        const data = snapshot.val();
        if (!data) { const err = new Error("not registered"); err.code = "not-registered"; throw err; }
        if (data.enabled === false) { const err = new Error("disabled"); err.code = "disabled"; throw err; }
        if (normalizeUserNameForIdentity(data.name) !== normalized) { const err = new Error("name mismatch"); err.code = "name-mismatch"; throw err; }
        if (!hasAuthorizedQuiz1400Scope(data)) { const err = new Error("scope denied"); err.code = "scope-denied"; throw err; }
        return data;
      });
    }

    function buildTargetUrl(uid, name) {
      const device = isMobileOrTablet() ? "mobile" : "desktop";
      const fileName = `${device}-${String(selectedPart).padStart(2, "0")}.html`;
      const target = new URL(fileName, location.href);
      target.searchParams.set("uid", uid);
      target.searchParams.set("name", name);
      ["chapter", "section"].forEach(key => {
        const value = params.get(key);
        if (value) target.searchParams.set(key, value);
      });
      return target.href;
    }

    function goToQuiz() {
      const uid = idInput.value.trim();
      const name = nameInput.value.trim();
      if (!selectedPart) {
        alert("학습할 부를 선택해주세요.");
        return;
      }
      if (!uid || !name) {
        alert("아이디와 이름을 입력해주세요.");
        return;
      }
      const button = document.getElementById("start-btn");
      button.disabled = true;
      verifyAuthorizedUser(uid, name)
        .then(() => {
          location.href = buildTargetUrl(uid, normalizeUserNameForIdentity(name));
        })
        .catch(error => {
          alert(getAuthorizationErrorMessage(error));
        })
        .then(() => {
          button.disabled = false;
        });
    }

    document.getElementById("start-btn").addEventListener("click", goToQuiz);
    [idInput, nameInput].forEach(input => {
      input.addEventListener("keydown", event => {
        if (event.key === "Enter") goToQuiz();
      });
    });

    const uid = params.get("uid") || "";
    const name = params.get("name") || "";
    idInput.value = uid;
    nameInput.value = name;
    renderPartState();

    if (selectedPart && uid && name) {
      verifyAuthorizedUser(uid, name)
        .then(() => location.replace(buildTargetUrl(uid, normalizeUserNameForIdentity(name))))
        .catch(error => alert(getAuthorizationErrorMessage(error)));
    }
  </script>
</body>
</html>

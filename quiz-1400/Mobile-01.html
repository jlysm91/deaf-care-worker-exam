<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>청각장애인 요양보호사 자격시험 대비: 1400題 1부</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --primary:#1D4ED8;--primary-light:#3B82F6;--primary-hover:#1E40AF;
      --primary-subtle:#BFDBFE;--success:#059669;--success-subtle:#ECFDF5;
      --danger:#DC2626;--danger-subtle:#FEF2F2;--text-primary:#0F172A;
      --text-secondary:#475569;--text-muted:#94A3B8;--border:#B8C4CE;
      --surface:#F2F4F6;--surface-2:#F8FAFC;--bg:#A2ACB8;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
    input{user-select:text;-webkit-user-select:text;}
    html,body{height:100%;overflow:hidden;font-family:'Noto Sans KR',-apple-system,sans-serif;background:var(--bg);color:var(--text-primary);}

    /* ━━━ 시작 페이지 ━━━ */
    #start-page{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(150deg,#0C1F5C 0%,#1D4ED8 52%,#0EA5E9 100%);padding:32px;}
    .start-card{background:rgba(255,255,255,0.12);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border:1px solid rgba(255,255,255,0.25);border-radius:20px;padding:36px 28px;width:100%;max-width:400px;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,0.22);}
    .start-badge{display:inline-block;background:rgba(255,255,255,0.18);border:1px solid rgba(255,255,255,0.35);color:rgba(255,255,255,0.95);font-size:12px;font-weight:700;letter-spacing:2px;padding:6px 18px;border-radius:50px;margin-bottom:20px;}
    .start-title{font-size:22px;font-weight:700;color:#fff;line-height:1.5;margin-bottom:10px;}
    .start-sub{font-size:14px;color:rgba(255,255,255,0.65);margin-bottom:28px;}
    .ipt-group{margin-bottom:12px;}
    .ipt-group input{width:100%;padding:14px 18px;background:rgba(255,255,255,0.96);border:2px solid transparent;border-radius:12px;font-size:15px;font-family:inherit;color:var(--text-primary);outline:none;}
    .ipt-group input::placeholder{color:var(--text-muted);}
    .ipt-group input:focus{background:#fff;border-color:rgba(255,255,255,0.8);}
    #start-quiz-btn{width:100%;padding:15px;margin-top:8px;font-size:15px;font-weight:700;font-family:inherit;border:none;border-radius:12px;background:var(--surface);color:var(--primary);cursor:pointer;}

    /* ━━━ 장 선택 페이지 ━━━ */
    #chapter-select-page{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(150deg,#0C1F5C 0%,#1D4ED8 52%,#0EA5E9 100%);padding:24px;overflow-y:auto;}
    .cs-badge{display:inline-block;background:rgba(255,255,255,0.18);border:1px solid rgba(255,255,255,0.35);color:rgba(255,255,255,0.95);font-size:12px;font-weight:700;letter-spacing:2px;padding:6px 18px;border-radius:50px;margin-bottom:14px;}
    .cs-title{font-size:24px;font-weight:800;color:#fff;margin-bottom:8px;text-align:center;}
    .cs-sub{font-size:13px;color:rgba(255,255,255,0.7);margin-bottom:24px;}
    .chapter-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;width:100%;max-width:440px;}
    .chapter-btn{background:rgba(255,255,255,0.95);border:none;border-radius:14px;padding:20px 16px;text-align:center;cursor:pointer;font-family:inherit;box-shadow:0 6px 20px rgba(0,0,0,0.15);}
    .ch-num{font-size:13px;font-weight:700;color:var(--primary);margin-bottom:5px;}
    .ch-name{font-size:15px;font-weight:700;color:var(--text-primary);line-height:1.4;}
    .ch-total{font-size:11px;color:var(--text-muted);margin-top:4px;}
    .ch-result{font-size:11px;font-weight:600;color:var(--success);margin-top:6px;min-height:16px;}

    /* ━━━ 퀴즈 페이지 ━━━ */
    #quiz-page{display:none;flex-direction:column;height:100vh;height:100dvh;overflow:hidden;}
    .mobile-header{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;padding-top:calc(10px + env(safe-area-inset-top,0px));background:var(--primary);color:#fff;min-height:48px;}
    .header-badge{font-size:12px;font-weight:700;letter-spacing:.5px;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3);padding:4px 12px;border-radius:50px;}
    .header-counter{font-size:14px;font-weight:600;}
    .header-counter .current{color:#fff;font-weight:800;}
    .header-counter .sep{color:rgba(255,255,255,0.55);}
    .header-counter .total{color:rgba(255,255,255,0.75);}
    .quiz-body{flex:1 1 auto;display:flex;flex-direction:column;min-height:0;overflow:hidden;}
    .video-section{flex-shrink:0;width:100%;aspect-ratio:16/9;position:relative;background:#000;}
    .video-section iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;}
    .quiz-scroll{flex:1 1 auto;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 14px 0;display:flex;flex-direction:column;gap:8px;background:var(--bg);}
    .quiz-scroll::-webkit-scrollbar{display:none;}
    .question-box{background:var(--primary-subtle);border-left:3px solid var(--primary-light);border-radius:8px;padding:10px 14px;flex-shrink:0;}
    .q-num-label{font-size:11px;font-weight:700;color:var(--primary);letter-spacing:.5px;margin-bottom:6px;}
    .q-text-content{font-size:15px;font-weight:700;color:var(--text-primary);line-height:1.65;word-break:keep-all;}
    .options-list{display:flex;flex-direction:column;gap:7px;padding-bottom:12px;}
    .opt-label{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;cursor:pointer;min-height:48px;}
    .opt-label input[type="radio"]{flex-shrink:0;accent-color:var(--primary);width:18px;height:18px;}
    .opt-label span{font-size:14px;font-weight:400;line-height:1.55;color:var(--text-primary);word-break:keep-all;flex:1;}
    .opt-label:has(input:checked){background:var(--primary);border-color:var(--primary);}
    .opt-label:has(input:checked) span{color:#fff;font-weight:600;}
    .bottom-nav{flex-shrink:0;display:flex;align-items:center;gap:8px;padding:10px 14px;padding-bottom:calc(10px + env(safe-area-inset-bottom,0px));background:var(--surface);border-top:1px solid var(--border);box-shadow:0 -2px 14px rgba(0,0,0,0.07);}
    .bottom-nav button{flex:1;padding:13px 8px;font-size:14px;font-weight:700;font-family:inherit;border-radius:10px;cursor:pointer;}
    #prev-btn{background:var(--surface-2);color:var(--text-secondary);border:1.5px solid var(--border);}
    #prev-btn:disabled{opacity:.35;cursor:not-allowed;}
    #nav-sheet-btn{background:var(--surface-2);color:var(--text-secondary);border:1.5px solid var(--border);}
    #next-btn{background:var(--primary);color:#fff;border:none;}
    #next-btn.submit-mode{background:var(--danger);}

    /* ━━━ Bottom Sheet (문항 이동) ━━━ */
    .sheet-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,0.5);z-index:200;opacity:0;transition:opacity .25s;}
    .sheet-overlay.active{display:block;}
    .sheet-overlay.visible{opacity:1;}
    .bottom-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-radius:20px 20px 0 0;padding:0 14px calc(16px + env(safe-area-inset-bottom,0px));z-index:201;max-height:60vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(0.32,0.72,0,1);}
    .bottom-sheet.visible{transform:translateY(0);}
    .sheet-sticky-top{position:sticky;top:0;background:var(--surface);padding:14px 0 12px;z-index:1;display:flex;align-items:center;justify-content:space-between;gap:8px;}
    .sheet-title-block{flex:1;text-align:center;}
    .sheet-title{font-size:12px;font-weight:700;color:var(--text-muted);letter-spacing:1.5px;}
    .sheet-progress-inline{font-size:12px;color:var(--text-secondary);font-weight:500;margin-left:8px;}
    .prog-answered{color:var(--success);font-weight:700;}
    .sheet-close-btn{flex-shrink:0;background:none;border:none;color:var(--text-muted);font-size:20px;padding:4px 8px;cursor:pointer;line-height:1;}
    .sheet-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:5px;}
    .sheet-nav-btn{background:var(--surface-2);border:1px solid var(--border);border-radius:6px;height:34px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:11px;font-weight:600;color:var(--text-secondary);cursor:pointer;line-height:1;}
    .sheet-nav-btn.answered{background:var(--success-subtle);color:var(--success);border-color:#6EE7B7;}
    .sheet-nav-btn.active-q{background:var(--primary);color:#fff;border-color:var(--primary);}
    .sheet-nav-btn .sn-num{font-size:12px;font-weight:700;}
    .sheet-nav-btn .sn-ans{font-size:9px;opacity:.85;}

    /* 태블릿 ━━━ */
    @media(min-width:601px){
      .mobile-header{min-height:56px;padding:12px 24px;}
      .header-badge{font-size:14px;}
      .header-counter{font-size:18px;}
      .quiz-body{flex-direction:row;}
      .video-section{flex:0 0 52%;width:52%;aspect-ratio:unset;align-self:stretch;display:flex;align-items:center;}
      .video-section iframe{position:relative;width:100%;height:auto;aspect-ratio:16/9;}
      .quiz-scroll{flex:1;padding:16px 18px 0;}
      .q-text-content{font-size:19px;}
      .opt-label{padding:14px 18px;min-height:56px;}
      .opt-label span{font-size:17px;}
      .bottom-nav{padding:12px 24px;gap:12px;}
      .bottom-nav button{padding:16px 8px;font-size:16px;border-radius:12px;}
    }

    /* ━━━ 결과 페이지 ━━━ */
    #result-page{display:none;flex-direction:column;height:100vh;height:100dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg);padding:20px 16px;padding-top:calc(20px + env(safe-area-inset-top,0px));padding-bottom:calc(24px + env(safe-area-inset-bottom,0px));gap:14px;}
    #result-page::-webkit-scrollbar{display:none;}
    .r-header{text-align:center;}
    .r-badge{display:inline-block;background:var(--primary);color:#fff;font-size:11px;font-weight:700;letter-spacing:2px;padding:4px 14px;border-radius:50px;margin-bottom:8px;}
    .r-title{font-size:22px;font-weight:800;color:var(--text-primary);margin-bottom:4px;}
    .r-name{font-size:13px;color:var(--text-muted);font-weight:500;}
    .r-score-card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:16px 12px;display:flex;box-shadow:0 2px 12px rgba(0,0,0,0.06);}
    .r-score-item{flex:1;text-align:center;}
    .r-score-item+.r-score-item{border-left:1.5px solid var(--border);}
    .r-score-label{font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:1px;margin-bottom:6px;}
    .r-score-total{font-size:36px;font-weight:900;color:var(--primary);line-height:1;}
    .r-score-sub{font-size:26px;font-weight:900;color:var(--text-primary);line-height:1;}
    .r-grid-wrap{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:14px 10px;box-shadow:0 2px 12px rgba(0,0,0,0.06);}
    .r-grid-label{font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:1px;text-align:center;margin-bottom:10px;}
    .r-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:4px;}
    .r-grid>div{border-radius:6px;padding:5px 2px;display:flex;flex-direction:column;align-items:center;gap:2px;}
    .r-grid .rn{font-size:11px;font-weight:800;}
    .r-grid .rm{font-size:9px;font-weight:600;opacity:.9;}
    .r-btn-wrap{display:flex;gap:10px;}
    .r-btn{flex:1;padding:14px;font-size:15px;font-weight:700;font-family:inherit;border:none;border-radius:12px;cursor:pointer;}
    .r-retry-btn{background:var(--primary);color:#fff;box-shadow:0 4px 14px rgba(29,78,216,.3);}
    .r-chapter-btn{background:var(--surface-2);color:var(--text-secondary);border:1.5px solid var(--border);}
    img,iframe{pointer-events:auto;-webkit-user-drag:none;}
  </style>
</head>
<body>
  <input type="hidden" id="user-id"/>
  <input type="hidden" id="user-name"/>

  <!-- 시작 페이지 -->
  <div id="start-page" style="display:none">
    <div class="start-card">
      <div class="start-badge">1400題 1부</div>
      <div class="start-title">청각장애인 요양보호사<br>자격시험 대비</div>
      <p class="start-sub">시작하기 전에 아이디와 이름을 입력해 주세요.</p>
      <div class="ipt-group"><input type="text" id="start-uid" placeholder="아이디"/></div>
      <div class="ipt-group"><input type="text" id="start-uname" placeholder="이름"/></div>
      <button id="start-quiz-btn">다음 →</button>
    </div>
  </div>

  <!-- 장 선택 페이지 -->
  <div id="chapter-select-page" style="display:none">
    <div class="cs-badge">1400題 1부</div>
    <h2 class="cs-title">1400題 1부 - 장 선택</h2>
    <p class="cs-sub">학습할 장을 선택해주세요.</p>
    <div class="chapter-grid">
      <button class="chapter-btn" data-chapter="1"><div class="ch-num">1장</div><div class="ch-name">요양보호 대상자 이해</div><div class="ch-total">33문항</div><div class="ch-result" id="result-ch1"></div></button>
      <button class="chapter-btn" data-chapter="2"><div class="ch-num">2장</div><div class="ch-name">노인복지와 장기요양 제도</div><div class="ch-total">103문항</div><div class="ch-result" id="result-ch2"></div></button>
      <button class="chapter-btn" data-chapter="3"><div class="ch-num">3장</div><div class="ch-name">노인의 인권과 보호</div><div class="ch-total">29문항</div><div class="ch-result" id="result-ch3"></div></button>
      <button class="chapter-btn" data-chapter="4"><div class="ch-num">4장</div><div class="ch-name">요양보호사의 인권보호와 자기계발</div><div class="ch-total">64문항</div><div class="ch-result" id="result-ch4"></div></button>
    </div>
  </div>

  <!-- 퀴즈 페이지 -->
  <div id="quiz-page" style="display:none">
    <div class="mobile-header">
      <div class="header-badge">1400題 1부</div>
      <div class="header-counter">
        <span class="current" id="current-q">1</span>
        <span class="sep"> / </span>
        <span class="total" id="total-q">33</span>
      </div>
    </div>
    <div class="quiz-body">
      <div class="video-section" id="video-section"></div>
      <div class="quiz-scroll" id="quiz-scroll">
        <div class="question-box">
          <div class="q-num-label">문제 <span id="q-number">1</span></div>
          <div class="q-text-content" id="q-text"></div>
        </div>
        <div class="options-list" id="options"></div>
      </div>
    </div>
    <div class="bottom-nav">
      <button id="prev-btn">← 이전</button>
      <button id="nav-sheet-btn">문항 이동</button>
      <button id="next-btn">다음 →</button>
    </div>
  </div>

  <div class="sheet-overlay" id="sheet-overlay"></div>
  <div class="bottom-sheet" id="bottom-sheet">
    <div class="sheet-sticky-top">
      <div class="sheet-title-block">
        <span class="sheet-title">빠른 문항 이동</span>
        <span class="sheet-progress-inline">&nbsp;·&nbsp; 답변 <span class="prog-answered" id="prog-answered">0</span> / 미답 <span id="prog-unanswered">0</span></span>
      </div>
      <button class="sheet-close-btn" id="sheet-close-btn">✕</button>
    </div>
    <div class="sheet-grid" id="sheet-grid"></div>
  </div>

  <!-- 결과 페이지 -->
  <div id="result-page" style="display:none">
    <div class="r-header">
      <div class="r-badge" id="result-badge">1장</div>
      <h2 class="r-title">시험 결과</h2>
      <div id="r-name" class="r-name"></div>
    </div>
    <div class="r-score-card">
      <div class="r-score-item"><div class="r-score-label">총점</div><div id="r-total" class="r-score-total"></div></div>
      <div class="r-score-item"><div class="r-score-label">총 문항</div><div id="r-max" class="r-score-sub"></div></div>
    </div>
    <div class="r-grid-wrap">
      <p class="r-grid-label">문항별 결과 &nbsp;·&nbsp; C: 정답 &nbsp;/&nbsp; M: 내 답</p>
      <div class="r-grid" id="r-grid"></div>
    </div>
    <div class="r-btn-wrap">
      <button class="r-btn r-chapter-btn" id="result-chapter-btn">장 선택하기</button>
      <button class="r-btn r-retry-btn" id="retry-btn">다시 풀기</button>
    </div>
  </div>

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  const chapter4Data=[
    {number:"4-1",question:"샘플 문제입니다.",options:["보기1","보기2","보기3","보기4","보기5"],correctAnswer:1,videoId:"1126688859"}
  ];

  const allChapterData={1:chapter1Data,2:chapter2Data,3:chapter3Data,4:chapter4Data};

  let EXAM_ID="",quizData=[],TOTAL=0,currentIndex=0;
  let currentUserId="",currentUserName="",currentChapter=0,userAnswers=[];

  const quizPage=document.getElementById("quiz-page");
  const resultPage=document.getElementById("result-page");
  const videoSection=document.getElementById("video-section");
  const optionsDiv=document.getElementById("options");
  const sheetGrid=document.getElementById("sheet-grid");
  const sheetOverlay=document.getElementById("sheet-overlay");
  const bottomSheet=document.getElementById("bottom-sheet");

  function setVideo(videoId,title){
    videoSection.innerHTML=`<iframe src="https://player.vimeo.com/video/${videoId}?title=0&byline=0&portrait=0&badge=0&autopause=0" allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share" title="${title}"></iframe>`;
  }

  document.getElementById("start-quiz-btn").addEventListener("click",()=>{
    const uid=document.getElementById("start-uid").value.trim();
    const uname=document.getElementById("start-uname").value.trim();
    if(!uid||!uname){alert("아이디와 이름을 입력해주세요.");return;}
    document.getElementById("user-id").value=uid;
    document.getElementById("user-name").value=uname;
    currentUserId=uid; currentUserName=uname;
    document.getElementById("start-page").style.display="none";
    document.getElementById("chapter-select-page").style.display="flex";
    loadChapterResults();
  });

  document.querySelectorAll(".chapter-btn").forEach(btn=>{
    btn.addEventListener("click",()=>{
      currentChapter=parseInt(btn.dataset.chapter);
      EXAM_ID=chapterToExamId[currentChapter];
      quizData=allChapterData[currentChapter];
      TOTAL=quizData.length;
      userAnswers=new Array(TOTAL).fill(null);
      document.getElementById("total-q").textContent=TOTAL;
      document.getElementById("result-badge").textContent=currentChapter+"장";
      startQuiz(currentUserId);
    });
  });

  function startQuiz(uid){
    const userRef=database.ref(`exams/${EXAM_ID}/users/${uid}`);
    userRef.once("value").then(snap=>{
      const data=snap.val();
      if(data&&data.result){
        document.getElementById("chapter-select-page").style.display="none";
        showResult({total:data.result.total,totalQ:data.result.totalQuestions||TOTAL,answers:data.result.answers||[],name:currentUserName});
      } else if(data&&data.progress){
        currentIndex=data.progress.currentQuestion||0;
        const raw=data.progress.answers||[];
        userAnswers=Array.from({length:TOTAL},(_,i)=>raw[i]!=null?raw[i]:null);
        showQuizPage();
      } else {
        currentIndex=0; userAnswers=new Array(TOTAL).fill(null);
        showQuizPage();
      }
    }).catch(()=>showQuizPage());
  }

  function saveProgress(){
    if(!currentUserId)return;
    database.ref(`exams/${EXAM_ID}/users/${currentUserId}/progress`).set({currentQuestion:currentIndex,answers:userAnswers});
  }

  function showQuizPage(){
    document.getElementById("chapter-select-page").style.display="none";
    quizPage.style.display="flex";
    resultPage.style.display="none";
    buildSheetGrid();
    updateQuestion(currentIndex);
  }

  function updateQuestion(index){
    currentIndex=index;
    const q=quizData[index];
    setVideo(q.videoId,q.number);
    document.getElementById("q-number").textContent=index+1;
    document.getElementById("q-text").textContent=q.question;
    document.getElementById("current-q").textContent=index+1;
    const scroll=document.getElementById("quiz-scroll");
    if(scroll)scroll.scrollTop=0;
    optionsDiv.innerHTML="";
    q.options.forEach((opt,i)=>{
      const label=document.createElement("label");
      label.className="opt-label";
      label.innerHTML=`<input type="radio" name="answer" value="${i+1}"><span>${opt}</span>`;
      optionsDiv.appendChild(label);
    });
    if(userAnswers[index]!==null){
      const r=optionsDiv.querySelector(`input[value="${userAnswers[index]}"]`);
      if(r)r.checked=true;
    }
    document.getElementById("prev-btn").disabled=(index===0);
    const nextBtn=document.getElementById("next-btn");
    if(index===TOTAL-1){nextBtn.textContent="제출하기";nextBtn.classList.add("submit-mode");}
    else{nextBtn.textContent="다음 →";nextBtn.classList.remove("submit-mode");}
    updateSheetGrid();
  }

  optionsDiv.addEventListener("change",e=>{
    userAnswers[currentIndex]=parseInt(e.target.value);
    saveProgress(); updateSheetGrid(); updateSheetProgress();
  });

  document.getElementById("prev-btn").addEventListener("click",()=>{
    if(currentIndex>0){updateQuestion(currentIndex-1);saveProgress();}
  });
  document.getElementById("next-btn").addEventListener("click",()=>{
    if(currentIndex===TOTAL-1)submitQuiz();
    else{updateQuestion(currentIndex+1);saveProgress();}
  });

  function submitQuiz(){
    const unanswered=userAnswers.filter(a=>a===null).length;
    if(unanswered>0&&!confirm(`아직 답하지 않은 문항이 ${unanswered}개 있습니다.\n그래도 제출하시겠습니까?`))return;
    let correct=0;
    quizData.forEach((item,i)=>{if(userAnswers[i]&&userAnswers[i]==item.correctAnswer)correct++;});
    if(currentUserId){
      const ref=database.ref(`exams/${EXAM_ID}/users/${currentUserId}`);
      ref.child("result").set({total:correct,totalQuestions:TOTAL,answers:userAnswers});
      ref.child("progress").remove();
    }
    quizPage.style.display="none";
    showResult({total:correct,totalQ:TOTAL,answers:userAnswers,name:currentUserName});
  }

  function showResult(d){
    resultPage.style.display="flex";
    document.getElementById("r-name").textContent="응시자 : "+d.name;
    document.getElementById("r-total").textContent=d.total+"점";
    document.getElementById("r-max").textContent=d.totalQ+"문항";
    const grid=document.getElementById("r-grid");
    grid.innerHTML="";
    for(let i=0;i<(d.answers.length||TOTAL);i++){
      const ua=d.answers[i]==null?"-":d.answers[i];
      const ca=quizData[i]?quizData[i].correctAnswer:"-";
      const ok=ua!=="-"&&parseInt(ua)===parseInt(ca);
      const cell=document.createElement("div");
      cell.style.background=ok?"#ECFDF5":"#FEF2F2";
      cell.style.border=ok?"1.5px solid #6EE7B7":"1.5px solid #FCA5A5";
      cell.style.color=ok?"#059669":"#DC2626";
      cell.innerHTML=`<div class="rn">${i+1}</div><div class="rm">C:${ca}/M:${ua}</div>`;
      grid.appendChild(cell);
    }
  }

  document.getElementById("retry-btn").addEventListener("click",()=>{
    if(!currentUserId){location.reload();return;}
    const ref=database.ref(`exams/${EXAM_ID}/users/${currentUserId}`);
    ref.child("progress").remove().then(()=>ref.child("result").remove()).then(()=>{
      currentIndex=0; userAnswers=new Array(TOTAL).fill(null);
      resultPage.style.display="none"; showQuizPage();
    });
  });

  document.getElementById("result-chapter-btn").addEventListener("click",()=>{
    resultPage.style.display="none";
    document.getElementById("chapter-select-page").style.display="flex";
    loadChapterResults();
  });

  function buildSheetGrid(){
    sheetGrid.innerHTML="";
    for(let i=0;i<TOTAL;i++){
      const btn=document.createElement("div");
      btn.className="sheet-nav-btn";
      btn.dataset.q=i;
      btn.innerHTML=`<div class="sn-num">${i+1}</div><div class="sn-ans"></div>`;
      btn.addEventListener("click",()=>{updateQuestion(i);saveProgress();closeSheet();});
      sheetGrid.appendChild(btn);
    }
    updateSheetGrid(); updateSheetProgress();
  }

  function updateSheetGrid(){
    const btns=sheetGrid.querySelectorAll(".sheet-nav-btn");
    btns.forEach((btn,i)=>{
      btn.classList.remove("answered","active-q");
      const ans=userAnswers[i];
      const ansEl=btn.querySelector(".sn-ans");
      if(ans!==null){btn.classList.add("answered");ansEl.textContent="("+ans+")";}
      else ansEl.textContent="";
      if(i===currentIndex)btn.classList.add("active-q");
    });
  }

  function updateSheetProgress(){
    const answered=userAnswers.filter(a=>a!=null).length;
    document.getElementById("prog-answered").textContent=answered;
    document.getElementById("prog-unanswered").textContent=TOTAL-answered;
  }

  function openSheet(){
    sheetOverlay.classList.add("active");
    requestAnimationFrame(()=>{sheetOverlay.classList.add("visible");bottomSheet.classList.add("visible");});
    updateSheetGrid(); updateSheetProgress();
  }
  function closeSheet(){
    sheetOverlay.classList.remove("visible"); bottomSheet.classList.remove("visible");
    setTimeout(()=>sheetOverlay.classList.remove("active"),280);
  }

  document.getElementById("nav-sheet-btn").addEventListener("click",openSheet);
  sheetOverlay.addEventListener("click",closeSheet);
  document.getElementById("sheet-close-btn").addEventListener("click",closeSheet);

  async function loadChapterResults(){
    if(!currentUserId)return;
    for(let ch=1;ch<=4;ch++){
      const examId=chapterToExamId[ch];
      const snap=await database.ref(`exams/${examId}/users/${currentUserId}/result`).once("value");
      const data=snap.val();
      const el=document.getElementById(`result-ch${ch}`);
      if(el)el.textContent=data?`(${data.total}점 / ${data.totalQuestions}문항)`:"";
    }
  }

  document.addEventListener("dragstart",e=>e.preventDefault());
  document.addEventListener("selectstart",e=>{if(e.target.tagName!=="INPUT")e.preventDefault();});
  document.addEventListener("contextmenu",e=>e.preventDefault());

  (function(){
    const params=new URLSearchParams(location.search);
    const uid=params.get("uid")||"";
    const name=params.get("name")||"";
    document.getElementById("user-id").value=uid;
    document.getElementById("user-name").value=name;
    if(uid&&name){
      currentUserId=uid; currentUserName=name;
      document.getElementById("chapter-select-page").style.display="flex";
      loadChapterResults();
    }
  })();
  </script>
</body>
</html>

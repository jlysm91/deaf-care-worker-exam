<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>청각장애인 요양보호사 자격시험 대비: 1400題 2부</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    if (new URLSearchParams(location.search).get('uid')) {
      document.write('<style>#start-page{display:none!important}</style>');
    }
  </script>
  <style>

    :root {
      --primary: #005D7A;
      --primary-light: #0E8FB2;
      --primary-hover: #004B63;
      --primary-subtle: #D8F0F8;
      --success: #0F8A4C;
      --success-subtle: #EAF8F1;

      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;

    input { user-select: text; -webkit-user-select: text; }
    img, iframe, a { -webkit-user-drag: none; pointer-events: auto; }

        radial-gradient(circle at 88% 84%, rgba(0, 93, 122, 0.14) 0%, transparent 40%),
        linear-gradient(160deg, #E9EEF4 0%, #D8E2EC 100%);

      justify-content: center;

    .start-wrapper { width: 100%; max-width: min(1180px, 94vw); position: relative; }
    .start-wrapper::before { content: ''; display: block; padding-top: 55%; }

    }
    .start-card {

    .select-page {

      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: clamp(20px, 4vw, 48px);
      background: linear-gradient(140deg, #063F57 0%, #005D7A 46%, #0E8FB2 100%);
      overflow-y: auto;
      overflow-x: hidden;
    }
    .select-shell {

    .cs-badge { margin-bottom: 16px; }

      color: #FFFFFF;

    .ch-result { min-height: 24px; margin-top: 12px; color: var(--success); font-size: clamp(15px, 1.2vw, 18px); font-weight: 800; }
    .back-btn {

      padding: 10px 18px;
      border: 1px solid rgba(255,255,255,0.42);
      border-radius: 999px;
      background: rgba(255,255,255,0.16);
      color: #FFFFFF;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    #quiz-page {
      display: none;
      grid-template-rows: minmax(0, 1fr) auto;
      height: 100vh;
      padding: clamp(12px, 1.8vh, 22px) clamp(14px, 2vw, 26px);
      gap: clamp(8px, 1.1vh, 12px);
      overflow: hidden;
    }
    .quiz-top {
      display: grid;
      grid-template-columns: minmax(0, 1.55fr) minmax(0, 1fr);
      gap: clamp(8px, 0.8vw, 12px);
      min-height: 0;
      align-items: stretch;
    }
    #video-container {
      min-height: 0;
      border-radius: var(--radius-lg);
      background: #000000;
      box-shadow: var(--shadow-soft);
      overflow: hidden;
      border: 1px solid #D6E0E9;
      display: flex;
      flex-direction: column;
    }
    .video-wrapper { width: 100%; flex: 1 1 auto; min-height: 0; position: relative; background: #000000; }
    .video-wrapper > div { position: absolute !important; inset: 0 !important; padding: 0 !important; background: #000000; }
    .video-wrapper iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; background: #000000; }
    #quiz-container {
      min-height: 0;
      background: rgba(255, 255, 255, 0.92);
      border-radius: var(--radius-lg);
      border: 1px solid #D8E2EB;
      box-shadow: var(--shadow-card);
      padding: clamp(12px, 1.5vh, 18px) clamp(12px, 1.5vw, 18px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    #quiz-content {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      padding-right: 4px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;

      flex-direction: column;
    }
    .question-meta { display: flex; align-items: center; gap: 8px; margin-bottom: clamp(10px, 1.3vh, 14px); }
    .q-num-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 14px;
      border-radius: 999px;
      background: linear-gradient(120deg, var(--primary) 0%, #0E8FB2 100%);
      color: #FFFFFF;
      font-size: clamp(11px, 0.9vw, 13px);
      font-weight: 700;
      letter-spacing: 0.1px;
    }
    #quiz-content h3 {
      font-size: clamp(14px, 1.5vw, 20px);
      line-height: 1.7;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: clamp(10px, 1.2vh, 14px);
      padding: clamp(10px, 1.2vh, 14px);
      background: linear-gradient(180deg, #DDF3FA 0%, #D3ECF5 100%);
      border-left: 4px solid var(--primary-light);
      border-radius: 10px;
      word-break: keep-all;
    }
    #options { display: flex; flex-direction: column; gap: clamp(5px, 0.7vh, 8px); flex: 1 1 auto; min-height: 0; }
    #options label {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1 1 auto;
      min-height: 0;
      padding: clamp(9px, 1.1vh, 13px) clamp(12px, 1.3vw, 16px);
      border-radius: 12px;
      border: 1.5px solid #C8D5E0;
      background: #FFFFFF;
      color: var(--text-primary);
      font-size: clamp(18px, 1.8vw, 24px);
      line-height: 1.5;
      font-weight: 400;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
      word-break: keep-all;
      white-space: normal;
    }
    #options label:hover { background: var(--primary-subtle); border-color: var(--primary-light); transform: translateX(2px); }
    #options input[type="radio"] { flex-shrink: 0; width: 16px; height: 16px; accent-color: var(--primary); }
    #options label:has(input:checked) {
      background: linear-gradient(120deg, var(--primary) 0%, #0E8FB2 100%);
      border-color: var(--primary);
      box-shadow: 0 5px 14px rgba(0, 93, 122, 0.18);
    }
    #options label:has(input:checked) span { color: #FFFFFF; font-weight: 700; }
    #navigation-buttons {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: clamp(12px, 1.6vh, 18px);
      padding-top: clamp(12px, 1.6vh, 18px);
      border-top: 1px solid #D8E2EB;
      flex-shrink: 0;
    }
    #navigation-buttons button, .result-actions button, #result-grid-nav button {
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s, opacity 0.15s;
    }
    #navigation-buttons button {
      min-width: 90px;
      padding: clamp(7px, 0.9vh, 10px) clamp(14px, 1.6vw, 22px);
      border-radius: 9px;
      font-size: clamp(12px, 1.05vw, 14px);
      font-weight: 700;
    }
    #prev-btn { background: #FFFFFF; color: var(--text-secondary); border: 1.5px solid var(--border); }
    #prev-btn:hover:not(:disabled) { background: #F3F8FB; color: var(--text-primary); }
    #prev-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    #next-btn {
      background: linear-gradient(120deg, var(--primary) 0%, #0E8FB2 100%);

      border: none;
      box-shadow: 0 5px 14px rgba(0, 93, 122, 0.22);
    }
    #next-btn:hover { background: linear-gradient(120deg, var(--primary-hover) 0%, #087C9C 100%); }
    #next-btn.submit-mode { background: linear-gradient(120deg, var(--danger) 0%, #D85A50 100%); box-shadow: 0 5px 14px rgba(193, 60, 54, 0.22); }
    #question-counter { min-width: 58px; text-align: center; color: var(--text-secondary); font-size: clamp(12px, 1.05vw, 14px); font-weight: 700; }
    #total-questions { color: var(--primary); }
    #quick-nav-container {
      display: none;
      flex-direction: column;
      justify-content: center;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid #D3DDE6;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      padding: clamp(10px, 1.4vh, 15px) clamp(12px, 1.5vw, 20px);
      overflow: hidden;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .nav-header { display: flex; align-items: center; justify-content: center; margin-bottom: clamp(6px, 0.8vh, 10px); }
    .nav-section-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 17px;
      border-radius: 999px;
      background: linear-gradient(120deg, var(--primary) 0%, #0E8FB2 100%);
      color: #FFFFFF;
      font-size: clamp(12px, 1vw, 14px);
      font-weight: 700;
      letter-spacing: 0.3px;
      text-align: center;
    }
    #quick-nav-wrapper { display: flex; align-items: center; gap: clamp(6px, 0.8vw, 10px); min-height: 0; }
    #quick-nav-grid-wrap { flex: 1 1 auto; overflow: hidden; padding-bottom: 2px; }
    #quick-nav-grid { display: grid; grid-template-columns: repeat(10, minmax(0, 1fr)); gap: clamp(3px, 0.35vw, 5px); }
    .nav-arrow {

      height: 34px;

      justify-content: center;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
    }
    .nav-arrow:hover:not(:disabled) { transform: scale(1.06); }
    .nav-arrow:disabled { opacity: 0.35; cursor: not-allowed; }
    .nav-btn {

      line-height: var(--nav-btn-height, 28px);
      padding: 0;
      border-radius: 7px;
      border: 1px solid #C5D1DB;
      background: #FFFFFF;
      color: var(--text-secondary);
      font-family: inherit;
      font-size: clamp(10px, 0.85vw, 13px);
      font-weight: 700;
      text-align: center;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s, color 0.12s, transform 0.12s;
      overflow: hidden;
      white-space: nowrap;
    }
    .nav-btn:hover { background: #E7F5FA; border-color: #85C9DE; color: var(--primary); }

    .nav-btn.answered { background: var(--success-subtle); color: var(--success); border-color: #84D7AC; }
    .nav-btn.correct { background: var(--success-subtle) !important; color: var(--success) !important; border-color: #84D7AC !important; }
    .nav-btn.incorrect { background: var(--danger-subtle) !important; color: var(--danger) !important; border-color: #EBA29D !important; }
    .nav-btn.unanswered { background: #F1F5F9 !important; color: #64748B !important; border-color: #CBD5E1 !important; }
    .nav-btn.placeholder { visibility: hidden; pointer-events: none; }

  function toAnswersArray(raw, total) {
    if (!raw) return new Array(total).fill(null);
    if (Array.isArray(raw)) {
      const arr = raw.slice(0, total);
      while (arr.length < total) arr.push(null);
      return arr;
    }
    const arr = new Array(total).fill(null);
    Object.keys(raw).forEach(k => {
      const idx = parseInt(k, 10);
      if (!Number.isNaN(idx) && idx >= 0 && idx < total) arr[idx] = raw[k];
    });
    return arr;
  }

    return `${currentChapter}장`;
  }

  function setResultBadge(label) {
    document.getElementById("result-badge").textContent = label;
  }

  document.getElementById("start-quiz-btn").addEventListener("click", () => {
    const uid = document.getElementById("start-uid").value.trim();
    const uname = document.getElementById("start-uname").value.trim();
    if (!uid || !uname) {
      alert("아이디와 이름을 입력해주세요.");
      return;
    }
    currentUserId = uid;
    currentUserName = uname;
    document.getElementById("user-id").value = uid;
    document.getElementById("user-name").value = uname;
    showPage(chapterSelectPage);
    loadChapterResults();
  });

  document.querySelectorAll("#chapter-select-page .chapter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const ch = parseInt(btn.dataset.chapter, 10);
      if (btn.dataset.sectionSelect === "true") {
        showPage(sectionSelectPage);
        loadSectionResults();
        return;
      }
      startChapter(ch);
    });
  });

  document.querySelectorAll("#section-select-page .chapter-btn").forEach(btn => {
    btn.addEventListener("click", () => startSection(parseInt(btn.dataset.section, 10)));
  });

  const backToChapterBtn = document.getElementById("back-to-chapter-btn");
  if (backToChapterBtn) {
    backToChapterBtn.addEventListener("click", () => {
      showPage(chapterSelectPage);
      loadChapterResults();
    });
  }

  function startChapter(ch) {
    if (!allChapterData[ch]) return;
    currentChapter = ch;
    currentSection = 0;
    EXAM_ID = chapterToExamId[ch];
    quizData = makePlayableData(allChapterData[ch]);
    TOTAL_QUESTIONS = quizData.length;
    currentQuestionIndex = 0;
    currentNavPage = 0;
    userAnswers = new Array(TOTAL_QUESTIONS).fill(null);
    setResultBadge(`${ch}장`);
    startQuiz(currentUserId);
  }

  function startSection(sec) {
    if (!allSectionData[sec]) return;
    currentChapter = 10;
    currentSection = sec;
    EXAM_ID = sectionToExamId[sec];
    quizData = makePlayableData(allSectionData[sec]);
    TOTAL_QUESTIONS = quizData.length;
    currentQuestionIndex = 0;
    currentNavPage = 0;
    userAnswers = new Array(TOTAL_QUESTIONS).fill(null);
    setResultBadge(`10장 ${sec}절`);
    startQuiz(currentUserId);
  }

  function startQuiz(uid) {
    if (!uid || !EXAM_ID) {
      showQuizPage();
      return;
    }
    const userRef = database.ref(`exams/${EXAM_ID}/users/${uid}`);
    userRef.once("value").then(snapshot => {
      const data = snapshot.val();
      if (data && data.result) {
        const totalQ = data.result.totalQuestions || TOTAL_QUESTIONS;
        userAnswers = toAnswersArray(data.result.answers, totalQ);
        showPage(resultPage);
        showResult({ total: data.result.total || 0, totalQ, answers: userAnswers, name: currentUserName });
      } else if (data && data.progress) {
        currentQuestionIndex = Math.min(data.progress.currentQuestion || 0, Math.max(TOTAL_QUESTIONS - 1, 0));
        userAnswers = toAnswersArray(data.progress.answers, TOTAL_QUESTIONS);
        showQuizPage();
      } else {
        currentQuestionIndex = 0;
        userAnswers = new Array(TOTAL_QUESTIONS).fill(null);
        showQuizPage();
      }
    }).catch(() => showQuizPage());
  }

  function showQuizPage() {
    showPage(quizPage, "flex");
    setQuizActive(true);
    updateQuizViewportHeight();
    initQuickNavBottomBar();
    enableQuizContentTouchScroll();
    closeQuickNavPanel();
    document.getElementById("quick-nav-container").style.display = "flex";
    updateQuestion(currentQuestionIndex);
    requestAnimationFrame(() => {
      applyResponsiveLayout();
      scheduleQuizAutoFit();
      autoResizeNavGrid();
    });
  }

  function saveProgress() {
    if (!currentUserId || !EXAM_ID) return;
    database.ref(`exams/${EXAM_ID}/users/${currentUserId}/progress`).set({
      currentQuestion: currentQuestionIndex,
      answers: userAnswers
    });
  }

  function updateQuestion(index) {
    if (!quizData.length) return;
    currentQuestionIndex = Math.max(0, Math.min(index, TOTAL_QUESTIONS - 1));
    currentNavPage = Math.floor(currentQuestionIndex / NAV_PAGE_SIZE);
    const q = quizData[currentQuestionIndex];
    videoWrapper.innerHTML = q.videoEmbed;
    document.getElementById("question-number").textContent = currentQuestionIndex + 1;
    document.getElementById("question-text").textContent = q.question;
    document.getElementById("current-question").textContent = currentQuestionIndex + 1;
    document.getElementById("total-questions").textContent = TOTAL_QUESTIONS;
    optionsDiv.innerHTML = "";
    q.options.forEach((option, i) => {
      const label = document.createElement("label");
      const input = document.createElement("input");
      input.type = "radio";
      input.name = "option";
      input.value = i + 1;
      if (parseInt(userAnswers[currentQuestionIndex], 10) === i + 1) input.checked = true;
      input.addEventListener("change", e => {
        userAnswers[currentQuestionIndex] = parseInt(e.target.value, 10);
        saveProgress();
        updateNavDisplay();
      });
      const span = document.createElement("span");
      span.textContent = option;
      label.appendChild(input);
      label.appendChild(span);
      bindOptionTouchScroll(label);
      optionsDiv.appendChild(label);
    });
    prevBtn.disabled = currentQuestionIndex === 0;
    if (currentQuestionIndex === TOTAL_QUESTIONS - 1) {
      nextBtn.textContent = "제출하기";
      nextBtn.classList.add("submit-mode");
    } else {
      nextBtn.textContent = "다음 →";
      nextBtn.classList.remove("submit-mode");
    }
    updateNavDisplay();
    requestAnimationFrame(() => {
      applyResponsiveLayout();
      fitQuestionText();
      fitOptionsText();
      autoResizeNavGrid();
    });
  }

  function updateNavDisplay() {
    quickNavGrid.innerHTML = "";
    const totalPages = Math.max(1, Math.ceil(TOTAL_QUESTIONS / NAV_PAGE_SIZE));
    currentNavPage = Math.max(0, Math.min(currentNavPage, totalPages - 1));
    const start = currentNavPage * NAV_PAGE_SIZE;
    for (let i = 0; i < NAV_PAGE_SIZE; i++) {
      const realIdx = start + i;
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "nav-btn";
      if (realIdx >= TOTAL_QUESTIONS) {
        btn.classList.add("placeholder");
        btn.dataset.label = "";
        btn.tabIndex = -1;
      } else {
        btn.textContent = realIdx + 1;
        btn.dataset.label = realIdx + 1;
        if (realIdx === currentQuestionIndex) btn.classList.add("active");
        if (userAnswers[realIdx] !== null && userAnswers[realIdx] !== undefined) btn.classList.add("answered");
        btn.addEventListener("click", () => {
          updateQuestion(realIdx);
          saveProgress();
          closeQuickNavPanel();
        });
      }
      quickNavGrid.appendChild(btn);
    }
    const showArrows = totalPages > 1;
    navPrevBtn.style.display = showArrows ? "flex" : "none";
    navNextBtn.style.display = showArrows ? "flex" : "none";
    navPrevBtn.disabled = currentNavPage === 0;
    navNextBtn.disabled = currentNavPage >= totalPages - 1;
  }

  navPrevBtn.addEventListener("click", () => {
    if (currentNavPage > 0) {
      currentNavPage--;
      updateNavDisplay();
      autoResizeNavGrid();
    }
  });

  navNextBtn.addEventListener("click", () => {
    const totalPages = Math.ceil(TOTAL_QUESTIONS / NAV_PAGE_SIZE);
    if (currentNavPage < totalPages - 1) {
      currentNavPage++;
      updateNavDisplay();
      autoResizeNavGrid();
    }
  });

  prevBtn.addEventListener("click", () => {
    if (currentQuestionIndex > 0) {
      updateQuestion(currentQuestionIndex - 1);
      saveProgress();
    }
  });

  nextBtn.addEventListener("click", () => {
    if (currentQuestionIndex < TOTAL_QUESTIONS - 1) {
      updateQuestion(currentQuestionIndex + 1);
      saveProgress();
    } else {
      submitQuiz();
    }
  });

  function submitQuiz() {
    const unanswered = userAnswers.filter(answer => answer === null || answer === undefined).length;
    if (unanswered > 0 && !confirm(`아직 답하지 않은 문항이 ${unanswered}개 있습니다.\n그래도 제출하시겠습니까?`)) return;
    let correct = 0;
    quizData.forEach((item, i) => {
      if (parseInt(userAnswers[i], 10) === parseInt(item.correctAnswer, 10)) correct++;
    });
    if (currentUserId && EXAM_ID) {
      const ref = database.ref(`exams/${EXAM_ID}/users/${currentUserId}`);
      ref.child("result").set({ total: correct, totalQuestions: TOTAL_QUESTIONS, answers: userAnswers });
      ref.child("progress").remove();
    }
    const resultData = {
      type: "examResult1400",
      total: correct,
      totalQuestions: TOTAL_QUESTIONS,
      answers: userAnswers,
      correctAnswers: quizData.map(q => q.correctAnswer),
      name: currentUserName,
      uid: currentUserId,
      examId: EXAM_ID,
      chapterLabel: getChapterLabel()
    };
    try {
      if (window.opener && !window.opener.closed) window.opener.postMessage(resultData, "*");
    } catch (e) {}
    showPage(resultPage);
    showResult({ total: correct, totalQ: TOTAL_QUESTIONS, answers: userAnswers, name: currentUserName });
    alert("제출 완료하였습니다!");
    try { window.close(); } catch (e) {}
  }

  function showResult(data) {
    const totalQ = data.totalQ || TOTAL_QUESTIONS;
    const correctCount = Number(data.total) || 0;
    currentResultAnswers = toAnswersArray(data.answers, totalQ);
    const unansweredCount = currentResultAnswers.filter(answer => answer === null || answer === undefined || answer === "").length;
    const wrongCount = Math.max(totalQ - correctCount - unansweredCount, 0);
    const passCount = Math.ceil(totalQ * 0.6);
    const rate = totalQ ? (correctCount / totalQ) * 100 : 0;
    const isPassed = correctCount >= passCount;
    const statusNote = isPassed ? (rate >= 80 ? "안정권" : "기준 통과, 복습 권장") : "재학습 필요";
    const scoreEl = document.getElementById("score");
    document.getElementById("result-user-name").textContent = data.name ? `응시자 : ${data.name}` : "";
    scoreEl.className = `result-summary ${isPassed ? "pass" : "fail"}`;
    scoreEl.innerHTML = `
      <div class="result-summary-main">
        <div class="result-status-card">
          <div class="result-status-label">${isPassed ? "합격" : "불합격"}</div>
          <div class="result-status-note">${statusNote}</div>
        </div>
        <div class="result-stats">
          <div class="result-stat"><strong>${rate.toFixed(1)}%</strong><span>정답률</span></div>
          <div class="result-stat"><strong>${correctCount} / ${totalQ}</strong><span>정답</span></div>
          <div class="result-stat"><strong>${wrongCount}</strong><span>오답</span></div>
          <div class="result-stat"><strong>${unansweredCount}</strong><span>미답</span></div>
        </div>
      </div>
      <div class="result-standard">장별 학습 기준: <strong>60% 이상</strong> · 합격 기준 정답 <strong>${passCount}문항 이상</strong></div>
    `;
    renderResultGrid(0);
    requestAnimationFrame(fitResultGrid);
  }

  function renderResultGrid(pageIdx) {
    resultPageIdx = pageIdx;
    const grid = document.getElementById("quick-nav-grid-result");
    const nav = document.getElementById("result-grid-nav");
    const total = currentResultAnswers.length || TOTAL_QUESTIONS;
    const totalPages = Math.max(1, Math.ceil(total / RESULT_PAGE_SIZE));
    const start = pageIdx * RESULT_PAGE_SIZE;
    const end = Math.min(start + RESULT_PAGE_SIZE, total);
    if (total > RESULT_PAGE_SIZE) {
      nav.style.display = "flex";
      document.getElementById("result-page-info").textContent = `${start + 1}~${end} / ${total}문항`;
      document.getElementById("result-prev-btn").disabled = pageIdx === 0;
      document.getElementById("result-next-btn").disabled = pageIdx >= totalPages - 1;
    } else {
      nav.style.display = "none";
    }
    grid.innerHTML = "";
    for (let i = 0; i < RESULT_PAGE_SIZE; i++) {
      const idx = start + i;
      const cell = document.createElement("div");
      cell.className = "nav-btn";
      if (idx >= total) {
        cell.classList.add("placeholder");
      } else {
        const uaRaw = currentResultAnswers[idx];
        const unanswered = uaRaw === null || uaRaw === undefined || uaRaw === "";
        const ua = unanswered ? "-" : uaRaw;
        const ca = quizData[idx] ? quizData[idx].correctAnswer : "-";
        const ok = !unanswered && parseInt(ua, 10) === parseInt(ca, 10);
        cell.classList.add(unanswered ? "unanswered" : (ok ? "correct" : "incorrect"));
        cell.innerHTML = `<span class="number">${idx + 1}</span><span class="detail">C:${ca} / M:${ua}</span>`;
      }
      grid.appendChild(cell);
    }
    requestAnimationFrame(fitResultGrid);
  }

  document.getElementById("result-prev-btn").addEventListener("click", () => {
    if (resultPageIdx > 0) renderResultGrid(resultPageIdx - 1);
  });

  document.getElementById("result-next-btn").addEventListener("click", () => {
    const total = currentResultAnswers.length || TOTAL_QUESTIONS;
    const totalPages = Math.ceil(total / RESULT_PAGE_SIZE);
    if (resultPageIdx < totalPages - 1) renderResultGrid(resultPageIdx + 1);
  });

  document.getElementById("result-return-btn").addEventListener("click", () => {
    if (!currentUserId || !EXAM_ID) {
      currentQuestionIndex = 0;
      userAnswers = new Array(TOTAL_QUESTIONS).fill(null);
      showQuizPage();
      return;
    }
    if (!confirm("다시 풀기를 하시겠습니까? 현재 결과가 삭제됩니다.")) return;
    const ref = database.ref(`exams/${EXAM_ID}/users/${currentUserId}`);
    ref.child("progress").remove()
      .then(() => ref.child("result").remove())
      .then(() => {
        currentQuestionIndex = 0;
        currentNavPage = 0;
        userAnswers = new Array(TOTAL_QUESTIONS).fill(null);
        showQuizPage();
      });
  });

  document.getElementById("result-chapter-btn").addEventListener("click", () => {
    if (currentSection > 0 && sectionSelectPage) {
      showPage(sectionSelectPage);
      loadSectionResults();
    } else {
      showPage(chapterSelectPage);
      loadChapterResults();
    }
  });

  async function loadChapterResults() {
    if (!currentUserId) return;
    for (const meta of chapterMeta) {
      const el = document.getElementById(`result-ch${meta.id}`);
      if (!el) continue;
      if (meta.sectionSelect) {
        let done = 0;
        for (const examId of Object.values(sectionToExamId)) {
          try {
            const snap = await database.ref(`exams/${examId}/users/${currentUserId}/result`).once("value");
            if (snap.val()) done++;
          } catch (e) {}
        }
        el.textContent = done > 0 ? `(${done}/${Object.keys(sectionToExamId).length}절 완료)` : "";
      } else {
        const examId = chapterToExamId[meta.id];
        try {
          const snap = await database.ref(`exams/${examId}/users/${currentUserId}/result`).once("value");
          const data = snap.val();
          el.textContent = data ? `(${data.total}점 / ${data.totalQuestions}문항)` : "";
        } catch (e) {}
      }
    }
  }

  async function loadSectionResults() {
    if (!currentUserId) return;
    for (const meta of sectionMeta) {
      const el = document.getElementById(`result-sec${meta.id}`);
      if (!el) continue;
      const examId = sectionToExamId[meta.id];
      try {
        const snap = await database.ref(`exams/${examId}/users/${currentUserId}/result`).once("value");
        const data = snap.val();
        el.textContent = data ? `(${data.total}점 / ${data.totalQuestions}문항)` : "";
      } catch (e) {}
    }
  }

  function applyResponsiveLayout() {
    updateQuizViewportHeight();
    const wrapper = document.querySelector(".video-wrapper");
    if (!wrapper) return;
    wrapper.style.height = "100%";
    const inner = wrapper.querySelector("div");
    if (inner) { inner.style.position = "relative"; inner.style.height = "100%"; inner.style.paddingTop = "0"; }
  }

  function fitQuestionText() {
    const h3 = document.querySelector("#quiz-content h3");
    const quizContainer = document.getElementById("quiz-container");
    if (!h3) return;
    const viewport = getViewportSize();
    const panelRect = quizContainer ? quizContainer.getBoundingClientRect() : { width: viewport.width, height: viewport.height };
    let size = Math.max(15, Math.min(17, viewport.width * 0.038));
    if (isTabletLandscapeLayout()) {
      size = Math.max(15, Math.min(20, Math.min(panelRect.width * 0.042, panelRect.height * 0.037)));
      for (let next = size; next >= 12; next -= 0.5) {
        h3.style.setProperty("--question-font-size", next + "px");
        const style = getComputedStyle(h3);
        const lineHeight = parseFloat(style.lineHeight) || next * 1.45;
        const paddingY = (parseFloat(style.paddingTop) || 0) + (parseFloat(style.paddingBottom) || 0);
        size = next;
        if (h3.scrollHeight <= lineHeight * 2 + paddingY + 3) break;
      }
    } else if (isPhoneLandscapeLayout()) {
      size = Math.max(13, Math.min(16, Math.min(panelRect.width * 0.05, panelRect.height * 0.06)));
    }
    h3.style.setProperty("--question-font-size", size + "px");
  }

  function fitOptionsText() {
    const optionsWrap = document.getElementById("options");
    const labels = Array.from(document.querySelectorAll("#options label"));
    if (!optionsWrap || !labels.length) return;
    labels.forEach(label => { label.style.removeProperty("--option-font-size"); label.style.removeProperty("flex"); });
    const viewport = getViewportSize();
    const optionsRect = optionsWrap.getBoundingClientRect();
    const tabletLandscape = isTabletLandscapeLayout();
    const phoneLandscape = isPhoneLandscapeLayout();
    let size = Math.max(14, Math.min(16, viewport.width * 0.036));
    if (tabletLandscape || phoneLandscape) {
      const minGap = phoneLandscape ? 5 : 7;
      const maxGap = phoneLandscape ? 8 : 12;
      const gap = Math.max(minGap, Math.min(maxGap, optionsRect.height * 0.018));
      const cardHeight = (optionsRect.height - (labels.length - 1) * gap) / labels.length;
      const maxSize = phoneLandscape ? 15 : 20;
      const minSize = phoneLandscape ? 12 : 9;
      size = Math.max(minSize, Math.min(maxSize, Math.min(optionsRect.width * 0.05, cardHeight * 0.42)));
      optionsWrap.style.setProperty("--tablet-option-gap", gap + "px");
      optionsWrap.style.setProperty("--tablet-option-padding-y", Math.max(phoneLandscape ? 6 : 8, Math.min(phoneLandscape ? 9 : 14, cardHeight * 0.18)) + "px");
      if (tabletLandscape) {
        const baseSize = size;
        optionsWrap.style.setProperty("--option-font-size", baseSize + "px");
        const wrapStates = labels.map(label => {
          const span = label.querySelector("span") || label;
          label.style.setProperty("--option-font-size", baseSize + "px");
          const style = getComputedStyle(span);
          const lineHeight = parseFloat(style.lineHeight) || baseSize * 1.4;
          return span.scrollHeight > lineHeight + 2 || span.scrollWidth > span.clientWidth + 1;
        });
        const longTextStates = labels.map(label => (label.querySelector("span") || label).textContent.trim().replace(/\s+/g, " ").length >= 27);
        const denseLongOptions = wrapStates.filter(Boolean).length >= Math.ceil(labels.length * 0.6) || longTextStates.filter(Boolean).length >= Math.ceil(labels.length * 0.8);
        labels.forEach((label, index) => {
          const span = label.querySelector("span") || label;
          const startSize = (wrapStates[index] || (denseLongOptions && longTextStates[index])) ? Math.max(minSize, baseSize - (denseLongOptions ? 2 : 1.5)) : baseSize;
          let fittedSize = startSize;
          for (let next = startSize; next >= minSize; next -= 0.5) {
            label.style.setProperty("--option-font-size", next + "px");
            const style = getComputedStyle(span);
            const lineHeight = parseFloat(style.lineHeight) || next * 1.4;
            fittedSize = next;
            if (span.scrollWidth <= span.clientWidth + 1 && span.scrollHeight <= lineHeight * 2 + 2 && label.scrollHeight <= label.clientHeight + 2) break;
          }
          if (fittedSize === baseSize) label.style.removeProperty("--option-font-size"); else label.style.setProperty("--option-font-size", fittedSize + "px");
          const style = getComputedStyle(span);
          const lineHeight = parseFloat(style.lineHeight) || fittedSize * 1.4;
          if (!denseLongOptions && span.scrollHeight > lineHeight + 2) label.style.setProperty("flex", "1.32 1 0", "important");
        });
      }
    } else {
      optionsWrap.style.removeProperty("--tablet-option-gap");
      optionsWrap.style.removeProperty("--tablet-option-padding-y");
    }
    optionsWrap.style.setProperty("--option-font-size", size + "px");
    optionsWrap.style.removeProperty("--option-card-min-height");
    labels.forEach(label => { label.style.removeProperty("padding-top"); label.style.removeProperty("padding-bottom"); });
  }

  function scrollQuizContentBy(delta) {
    const scroller = document.getElementById("quiz-content");
    if (!scroller || scroller.scrollHeight <= scroller.clientHeight + 1) return false;
    scroller.scrollTop += delta;
    return true;
  }

  function bindOptionTouchScroll(label) {
    if (!label || label.dataset.optionTouchScroll === "1") return;
    let startY = 0;
    let lastY = 0;
    let moved = false;
    let suppressClick = false;

    label.addEventListener("touchstart", event => {
      if (event.touches.length !== 1) return;
      startY = event.touches[0].clientY;
      lastY = startY;
      moved = false;
    }, { passive: true });

    label.addEventListener("touchmove", event => {
      if (event.touches.length !== 1) return;
      const y = event.touches[0].clientY;
      const delta = lastY - y;
      if (Math.abs(delta) <= 1) return;
      const didScroll = scrollQuizContentBy(delta);
      lastY = y;
      if (Math.abs(y - startY) > 5) moved = true;
      if (didScroll) {
        if (event.cancelable) event.preventDefault();
        event.stopPropagation();
      }
    }, { passive: false });

    label.addEventListener("touchend", () => {
      if (!moved) return;
      suppressClick = true;
      setTimeout(() => { suppressClick = false; }, 120);
    }, { passive: true });

    label.addEventListener("touchcancel", () => {
      moved = false;
      suppressClick = false;
    }, { passive: true });

    label.addEventListener("click", event => {
      if (!suppressClick) return;
      event.preventDefault();
      event.stopPropagation();
      suppressClick = false;
    }, true);

    label.dataset.optionTouchScroll = "1";
  }

  function enableQuizContentTouchScroll() {
    const scroller = document.getElementById("quiz-content");
    if (!scroller || scroller.dataset.touchScrollInit === "1") return;
    let lastY = 0;
    let moved = false;
    scroller.addEventListener("touchstart", event => {
      if (event.touches.length !== 1) return;
      lastY = event.touches[0].clientY;
      moved = false;
    }, { passive: true });
    scroller.addEventListener("touchmove", event => {
      if (event.touches.length !== 1 || scroller.scrollHeight <= scroller.clientHeight + 1) return;
      const y = event.touches[0].clientY;
      const delta = lastY - y;
      if (Math.abs(delta) <= 1) return;
      scroller.scrollTop += delta;
      lastY = y;
      moved = true;
      if (event.cancelable) event.preventDefault();
      event.stopPropagation();
    }, { passive: false });
    scroller.addEventListener("click", event => {
      if (!moved) return;
      event.preventDefault();
      event.stopPropagation();
      moved = false;
    }, true);
    scroller.dataset.touchScrollInit = "1";
  }

  let quizAutoFitFrame = 0;
  function scheduleQuizAutoFit() {
    if (quizAutoFitFrame) cancelAnimationFrame(quizAutoFitFrame);
    quizAutoFitFrame = requestAnimationFrame(() => { fitQuestionText(); fitOptionsText(); requestAnimationFrame(autoResizeNavGrid); });
  }

  function autoResizeNavGrid() {
    const wrap = document.getElementById("quick-nav-grid-wrap");
    const grid = document.getElementById("quick-nav-grid");
    if (!wrap || !grid) return;
    const viewport = getViewportSize();
    const tabletLandscape = isTabletLandscapeLayout();
    const cols = tabletLandscape ? 20 : 10;
    const rows = Math.ceil(NAV_PAGE_SIZE / cols);
    const gap = tabletLandscape ? 5 : (viewport.width <= 700 ? 4 : 6);
    grid.style.gridTemplateColumns = "repeat(" + cols + ", minmax(0, 1fr))";
    grid.style.gap = gap + "px";
    const wrapStyles = getComputedStyle(wrap);
    const padX = (parseFloat(wrapStyles.paddingLeft) || 0) + (parseFloat(wrapStyles.paddingRight) || 0);
    const padY = (parseFloat(wrapStyles.paddingTop) || 0) + (parseFloat(wrapStyles.paddingBottom) || 0);
    const wrapWidth = Math.max(280, wrap.clientWidth || (viewport.width - (viewport.width <= 700 ? 10 : 16)));
    const usableWidth = Math.max(220, wrapWidth - padX);
    const widthBtnH = Math.floor((usableWidth - gap * (cols - 1)) / cols);
    const nav = document.getElementById("navigation-buttons");
    const navH = nav ? Math.ceil(nav.getBoundingClientRect().height) : 64;
    const bottomReserve = tabletLandscape ? 0 : Math.max(74, navH + 12);
    const topReserve = tabletLandscape ? 0 : (viewport.width <= 700 ? 10 : 16);
    const wrapMaxH = tabletLandscape ? Math.max(96, wrap.clientHeight || 160) : Math.max(190, viewport.height - bottomReserve - topReserve);
    const usableHeight = Math.max(140, wrapMaxH - padY);
    const heightBtnH = Math.floor((usableHeight - gap * (rows - 1)) / rows);
    let btnH = Math.min(widthBtnH, heightBtnH);
    if (tabletLandscape) btnH = Math.max(24, Math.min(btnH, 34)); else btnH = Math.max(viewport.width <= 700 ? 22 : 24, Math.min(btnH, viewport.width <= 700 ? 34 : 36));
    const gridHeight = rows * btnH + (rows - 1) * gap;
    const wrapHeight = gridHeight + padY;
    document.documentElement.style.setProperty("--nav-btn-height", btnH + "px");
    grid.style.height = gridHeight + "px";
    wrap.style.height = wrapHeight + "px";
    wrap.style.maxHeight = wrapHeight + "px";
    wrap.style.overflowY = "hidden";
  }

  function fitResultGrid() {
    const resultGrid = document.getElementById("quick-nav-grid-result");
    if (!resultGrid) return;
    const cells = resultGrid.querySelectorAll(".nav-btn:not(.placeholder)");
    cells.forEach(cell => {
      const detail = cell.querySelector(".detail");
      if (!detail) return;
      detail.style.fontSize = "";
      let size = parseFloat(getComputedStyle(detail).fontSize);
      while ((detail.scrollWidth > cell.clientWidth - 4 || detail.scrollHeight > cell.clientHeight / 2) && size > 8) {
        size -= 0.5;
        detail.style.fontSize = `${size}px`;
      }
    });
  }

  window.addEventListener("resize", () => {
    updateQuizViewportHeight();
    initQuickNavBottomBar();
    applyResponsiveLayout();
    scheduleQuizAutoFit();
    fitResultGrid();
  });

  if (window.visualViewport) {
    window.visualViewport.addEventListener("resize", () => {
      updateQuizViewportHeight();
      initQuickNavBottomBar();
      fitResultGrid();
      scheduleQuizAutoFit();
    });
  }

  window.addEventListener("orientationchange", () => setTimeout(() => {
    updateQuizViewportHeight();
    initQuickNavBottomBar();
    fitResultGrid();
    scheduleQuizAutoFit();
  }, 120));

  (function initFromParams() {
    const params = new URLSearchParams(location.search);
    const uid = params.get("uid") || "";
    const name = params.get("name") || "";
    const chapterParam = params.get("chapter");
    const sectionParam = params.get("section");
    if (uid && name) {
      document.getElementById("user-id").value = uid;
      document.getElementById("user-name").value = name;
      document.getElementById("start-uid").value = uid;
      document.getElementById("start-uname").value = name;
      currentUserId = uid;
      currentUserName = name;
      if (sectionParam && allSectionData[parseInt(sectionParam, 10)]) {
        startSection(parseInt(sectionParam, 10));
        return;
      }
      if (chapterParam) {
        const ch = parseInt(chapterParam, 10);
        if (ch === 10 && sectionSelectPage) {
          showPage(sectionSelectPage);
          loadSectionResults();
          return;
        }
        if (allChapterData[ch]) {
          startChapter(ch);
          return;
        }
      }
      showPage(chapterSelectPage);
      loadChapterResults();
    } else {
      showPage(startPage);
    }
  })();

  document.addEventListener("dragstart", e => e.preventDefault());
  document.addEventListener("selectstart", e => {
    if (e.target.tagName !== "INPUT") e.preventDefault();
  });
  document.addEventListener("contextmenu", e => e.preventDefault());
  document.addEventListener("mousedown", e => {
    if (e.target.tagName !== "INPUT" && e.target.tagName !== "BUTTON") e.preventDefault();
  });

  </script>
</body>
</html>

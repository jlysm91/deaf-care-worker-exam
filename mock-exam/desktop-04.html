    #score {

    #quick-nav-container-result { width: 100%; max-width: 1000px; }
    .result-grid-title {

    #quick-nav-grid-result { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; margin-bottom: 40px; }
    #quick-nav-grid-result .nav-btn {

    #result-return-btn {

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
  </style>
</head>

    }

    function fitQuestionText(){
      const h3 = document.querySelector("#quiz-content h3");
      const container = document.getElementById("quiz-container");
      if(!h3 || !container) return;
      const maxSize = Math.min(20, Math.max(12, container.clientWidth * 0.022));
      let size = maxSize;
      h3.style.fontSize = size + "px";
      const maxH = size * 1.7 * 2;
      while(h3.scrollHeight > maxH + 2 && size > 12){
        size -= 0.5;
        h3.style.fontSize = size + "px";
      }
    }

    function fitOptionsText(){
      const quizContent = document.getElementById("quiz-content");
      const labels = document.querySelectorAll("#options label");
      if(!quizContent || !labels.length) return;

      // 1단계: 기본 크기로 초기화
      labels.forEach(l => l.style.fontSize = "");

      // 2단계: 각 선택지 개별 축소 (두 줄이면 최대 15% 이내 조금만 줄이기)
      labels.forEach(label => {
        label.style.whiteSpace = "nowrap";
        const oneLineH = label.scrollHeight;
        label.style.whiteSpace = "";
        if(label.scrollHeight > oneLineH * 1.3){
          const defaultSize = parseFloat(getComputedStyle(label).fontSize);
          const minSize = defaultSize * 0.85;
          let size = defaultSize;
          while(label.scrollHeight > oneLineH * 1.3 && size > minSize){
            size -= 0.3;
            label.style.fontSize = size + "px";
          }
        }
      });

      // 3단계: 그래도 전체가 넘치면 → 모든 선택지 함께 추가 축소
      if(quizContent.scrollHeight > quizContent.clientHeight + 2){
        let size = parseFloat(getComputedStyle(labels[0]).fontSize);
        while(quizContent.scrollHeight > quizContent.clientHeight + 2 && size > 12){
          size -= 0.5;
          labels.forEach(l => l.style.fontSize = size + "px");
        }
      }
    }

    ];

    const quizData=quizRawData.map(item=>({...item,videoEmbed:getVideoEmbed(item.videoId,item.number)}));
    const TOTAL_QUESTIONS=quizData.length;
    let currentQuestionIndex=0,currentUserId="",userAnswers=new Array(TOTAL_QUESTIONS).fill(null);

    function startQuiz(uid,userName){
      currentUserId=uid;
      const userRef=database.ref(`exams/${EXAM_ID}/users/${uid}`);
      userRef.once("value").then(snapshot=>{
        const data=snapshot.val();
        if(data&&data.result){
          startPage.style.display="none";resultPage.style.display="flex";
          scoreSpan.textContent=`총점: ${data.result.total}점 ( 필기: ${data.result.필기}점 / 실기: ${data.result.실기}점 )`;
          if(data.result.answers)userAnswers=data.result.answers;
          document.getElementById("quick-nav-container-result").style.display="block";renderResultNav();
        }else if(data&&data.progress){
          currentQuestionIndex=data.progress.currentQuestion||0;
          userAnswers=data.progress.answers||new Array(TOTAL_QUESTIONS).fill(null);showQuizPage();
        }else{currentQuestionIndex=0;userAnswers=new Array(TOTAL_QUESTIONS).fill(null);showQuizPage();}
      });
    }

    function showQuizPage(){
      startPage.style.display="none";quizPage.style.display="grid";
      document.getElementById("quick-nav-container").style.display="flex";
      createQuickNavButtons();updateQuestion(currentQuestionIndex);
      requestAnimationFrame(()=>{
        applyResponsiveLayout();
        fitQuestionText();
        fitOptionsText();
        requestAnimationFrame(()=>{
          autoResizeNavGrid();
          requestAnimationFrame(autoResizeNavGrid);
        });
      });
    }

    function saveQuizProgress(){
      if(!currentUserId)return;
      database.ref(`exams/${EXAM_ID}/users/${currentUserId}/progress`).set({currentQuestion:currentQuestionIndex,answers:userAnswers});
    }

    function updateQuestion(index){
      currentQuestionIndex=index;
      const question=quizData[currentQuestionIndex];
      videoWrapper.innerHTML=question.videoEmbed;
      requestAnimationFrame(applyResponsiveLayout);
      questionNumberSpan.textContent=currentQuestionIndex+1;
      questionTextSpan.textContent=question.question;
      currentQuestionSpan.textContent=currentQuestionIndex+1;
      totalQuestionsSpan.textContent=TOTAL_QUESTIONS;
      requestAnimationFrame(fitQuestionText);
      requestAnimationFrame(fitOptionsText);
      optionsDiv.innerHTML="";
      question.options.forEach((option,i)=>{
        const label=document.createElement("label");
        label.innerHTML=`<input type="radio" name="answer" value="${i+1}"><span>${option}</span>`;
        optionsDiv.appendChild(label);
      });
      if(userAnswers[currentQuestionIndex]!==null){
        const r=optionsDiv.querySelector(`input[value="${userAnswers[currentQuestionIndex]}"]`);
        if(r)r.checked=true;
      }
      document.querySelectorAll(".nav-btn").forEach((btn,i)=>{
        btn.classList.remove("active","answered");
        const ans=userAnswers[i];
        btn.textContent=ans?`${i+1}(${ans})`:i+1;
        if(ans)btn.classList.add("answered");
      });
      const cur=document.querySelector(`.nav-btn[data-q="${currentQuestionIndex}"]`);
      if(cur)cur.classList.add("active");
      prevBtn.disabled=currentQuestionIndex===0;
      nextBtn.textContent=currentQuestionIndex===TOTAL_QUESTIONS-1?"제출하기":"다음 →";
      if(currentQuestionIndex===TOTAL_QUESTIONS-1)nextBtn.classList.add("submit-mode");
      else nextBtn.classList.remove("submit-mode");
    }

    function createQuickNavButtons(){
      quickNavGrid.innerHTML="";
      const FIXED_SIZE=80;
      for(let i=0;i<FIXED_SIZE;i++){
        const btn=document.createElement("div");
        btn.classList.add("nav-btn");
        if(i<TOTAL_QUESTIONS){
          btn.textContent=i+1;btn.dataset.q=i;
          btn.draggable=false;btn.addEventListener("mousedown",e=>e.preventDefault());
        } else {
          btn.style.opacity="0";
          btn.style.pointerEvents="none";
        }
        quickNavGrid.appendChild(btn);
      }
    }

    function disableAnswers(){
      optionsDiv.querySelectorAll("input[type=radio]").forEach(r=>r.disabled=true);
      quickNavGrid.style.pointerEvents="none";
    }

    function submitQuiz(){
      let 필기=0,실기=0;
      quizData.forEach((item,i)=>{
        if(userAnswers[i]&&userAnswers[i]==item.correctAnswer){if(i<35)필기++;else 실기++;}
      });
      const 총점=필기+실기;
      quizPage.style.display="none";resultPage.style.display="flex";
      scoreSpan.textContent=`총점: ${총점}점 ( 필기: ${필기}점 / 실기: ${실기}점 )`;
      if(currentUserId){
        const ref=database.ref(`exams/${EXAM_ID}/users/${currentUserId}`);
        ref.child("result").set({total:총점,필기,실기,answers:userAnswers});
        ref.child("progress").remove();
      }
      renderResultNav();disableAnswers();alert("제출 완료하였습니다!");
      const googleFormURL="https://docs.google.com/forms/d/e/1FAIpQLSdpxneZyV9yTdMvI-jaaIdkE50RdNuIHP161SFVk2m5rX8fQA/formResponse";
      const fd=new FormData();
      fd.append("entry.295783163",userNameInput.value.trim());
      fd.append("entry.516479247",`${총점}점 ( 필기: ${필기}점 / 실기: ${실기}점 )`);
      fetch(googleFormURL,{method:"POST",body:fd,mode:"no-cors"}).catch(console.error);
      const resultData={type:"examResult",total:총점,필기:필기,실기:실기,answers:userAnswers,correctAnswers:quizData.map(q=>q.correctAnswer),name:userNameInput.value.trim()};
      try{if(window.opener&&!window.opener.closed){window.opener.postMessage(resultData,"*");}}catch(e){console.error(e);}
      try{window.close();}catch(e){}
    }

    function resetQuiz(){
      if(!currentUserId){location.reload();return;}
      alert("초기화되었습니다!");
      const ref=database.ref(`exams/${EXAM_ID}/users/${currentUserId}`);
      ref.child("progress").remove().then(()=>ref.child("result").remove()).then(()=>{
        resultPage.style.display="none";currentQuestionIndex=0;
        userAnswers=new Array(TOTAL_QUESTIONS).fill(null);showQuizPage();
        quickNavGrid.style.pointerEvents="auto";
      });
    }

    function renderResultNav(){
      const grid=document.getElementById("quick-nav-grid-result");grid.innerHTML="";
      quizData.forEach((q,i)=>{
        const div=document.createElement("div");div.classList.add("nav-btn");div.style.pointerEvents="none";
        const ua=userAnswers[i]==null?"-":userAnswers[i];
        const num=document.createElement("div");num.classList.add("number");num.textContent=i+1;
        const det=document.createElement("div");det.classList.add("detail");det.textContent=`C:${q.correctAnswer}/M:${ua}`;
        div.appendChild(num);div.appendChild(det);
        div.classList.add(ua!=="-"&&ua===q.correctAnswer?"correct":"incorrect");
        grid.appendChild(div);
      });
    }

    (function(){
      const params=new URLSearchParams(window.location.search);
      const uid=params.get('uid')||'';
      const name=params.get('name')||'';
      userIdInput.value=uid;
      userNameInput.value=name;
      if(uid&&name){startQuiz(uid,name);}
    })();

    startQuizBtn.addEventListener("click",()=>{
      const uid=userIdInput.value.trim(),name=userNameInput.value.trim();
      if(!uid||!name){alert("아이디와 이름을 입력해주세요.");return;}
      startQuiz(uid,name);
    });
    nextBtn.addEventListener("click",()=>{
      if(currentQuestionIndex===TOTAL_QUESTIONS-1)submitQuiz();
      else{updateQuestion(currentQuestionIndex+1);saveQuizProgress();}
    });
    prevBtn.addEventListener("click",()=>{
      if(currentQuestionIndex>0){updateQuestion(currentQuestionIndex-1);saveQuizProgress();}
    });
    quickNavGrid.addEventListener("click",e=>{
      if(e.target.classList.contains("nav-btn")){updateQuestion(parseInt(e.target.dataset.q));saveQuizProgress();}
    });
    optionsDiv.addEventListener("change",e=>{
      const ans=parseInt(e.target.value);userAnswers[currentQuestionIndex]=ans;saveQuizProgress();
      const btn=document.querySelector(`.nav-btn[data-q="${currentQuestionIndex}"]`);
      if(btn){btn.textContent=`${currentQuestionIndex+1}(${ans})`;btn.classList.add("answered");}
    });
    document.getElementById("result-return-btn").addEventListener("click",resetQuiz);

    function autoResizeNavGrid(){
      const navCont=document.getElementById("quick-nav-container");
      const grid=document.getElementById("quick-nav-grid");
      if(!navCont||!grid)return;
      const navH=navCont.clientHeight;
      const cs=getComputedStyle(navCont);
      const padV=parseFloat(cs.paddingTop)+parseFloat(cs.paddingBottom);
      const headerH=(document.querySelector(".nav-header")||{}).offsetHeight||0;
      const gridGap=parseFloat(getComputedStyle(grid).gap)||5;
      const rowGaps=7*gridGap;
      const gridH=navH-padV-headerH;
      const btnH=Math.max(14,Math.min(28,Math.floor((gridH-rowGaps)/8)));
      document.documentElement.style.setProperty("--nav-btn-height",btnH+"px");
      const fixedGridH=btnH*8+rowGaps;
      grid.style.height=fixedGridH+"px";
      const navHeader=document.querySelector(".nav-header");
      const headerMarginB=navHeader?parseFloat(getComputedStyle(navHeader).marginBottom)||0:0;
      const fixedNavH=fixedGridH+padV+headerH+headerMarginB;
      const quizPage=document.getElementById("quiz-page");
      if(quizPage) quizPage.style.gridTemplateRows="1fr "+fixedNavH+"px";
    }

    window.addEventListener("resize",()=>{
      applyResponsiveLayout();
      fitQuestionText();
      fitOptionsText();
      requestAnimationFrame(autoResizeNavGrid);
    });

    document.addEventListener("dragstart",e=>e.preventDefault());
    document.addEventListener("selectstart",e=>e.preventDefault());
    document.addEventListener("contextmenu",e=>e.preventDefault());
    document.addEventListener("mousedown",e=>{
      if(e.target.tagName!=="INPUT"&&e.target.tagName!=="TEXTAREA"&&e.target.tagName!=="BUTTON"){e.preventDefault();}
    });
  </script>
</body>
</html>

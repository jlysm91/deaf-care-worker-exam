<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>청각장애인 요양보호사 자격시험 대비: 6회 모의고사</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
    if(new URLSearchParams(location.search).get('uid')){
      document.write('<style>#start-page{display:none!important}</style>');
    }
  </script>
  <style>
    :root {
      --primary: #005D7A;
      --primary-light: #0E8FB2;
      --primary-hover: #004B63;
      --primary-subtle: #D8F0F8;
      --success: #0F8A4C;
      --success-subtle: #EAF8F1;
      --danger: #C13C36;
      --danger-subtle: #FCEEEE;
      --text-primary: #162230;
      --text-secondary: #4A5D71;
      --text-muted: #71839A;
      --border: #C6D3DE;
      --surface: #F8FBFD;
      --surface-2: #FFFFFF;
      --bg: #E8EEF4;
      --shadow-soft: 0 12px 28px rgba(22, 34, 48, 0.08);
      --shadow-card: 0 8px 20px rgba(22, 34, 48, 0.07);
      --radius-lg: 18px;
      --radius-md: 12px;
      --radius-sm: 9px;
      --vw-ratio: 1;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-user-select: none;
    }
    input { user-select: text; -webkit-user-select: text; }
    img, iframe, a { -webkit-user-drag: none; pointer-events: auto; }

    html, body {
      overflow: hidden !important;
      height: 100% !important;
    }

    body {
      font-family: 'Noto Sans KR', -apple-system, sans-serif;
      color: var(--text-primary);
      min-height: 100vh;
      background:
        radial-gradient(circle at 12% 14%, rgba(46, 131, 167, 0.20) 0%, transparent 36%),
        radial-gradient(circle at 88% 84%, rgba(0, 93, 122, 0.14) 0%, transparent 40%),
        linear-gradient(160deg, #E9EEF4 0%, #D8E2EC 100%);
    }

    #start-page {
      display: none;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: clamp(16px, 3vw, 34px);
    }
    .start-wrapper {
      width: 100%;
      max-width: min(1180px, 94vw);
      position: relative;
    }
    .start-wrapper::before {
      content: '';
      display: block;
      padding-top: 55%;
    }
    .start-inner {
      position: absolute;
      inset: 0;
      border-radius: 24px;
      overflow: hidden;
      background:
        linear-gradient(140deg, #063F57 0%, #005D7A 46%, #0E8FB2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 24px 56px rgba(10, 36, 53, 0.30);
      border: 1px solid rgba(255, 255, 255, 0.20);
    }
    .start-inner::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 18% 18%, rgba(255, 255, 255, 0.16) 0%, transparent 34%),
        radial-gradient(circle at 80% 74%, rgba(255, 255, 255, 0.12) 0%, transparent 36%);
      pointer-events: none;
    }
    .start-card {
      position: relative;
      z-index: 1;
      width: clamp(330px, 40vw, 520px);
      text-align: center;
      padding: clamp(28px, 4vw, 52px) clamp(24px, 4.5vw, 56px);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.13);
      border: 1px solid rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 24px 58px rgba(4, 24, 39, 0.34);
    }
    .start-badge {
      display: inline-block;
      padding: 6px 16px;
      margin-bottom: 20px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.34);
      color: #F4FBFF;
      font-size: clamp(10px, 0.9vw, 12px);
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    #start-page h2 {
      font-size: clamp(20px, 2.3vw, 30px);
      font-weight: 700;
      color: #FFFFFF;
      line-height: 1.45;
      letter-spacing: -0.4px;
      margin-bottom: 8px;
    }
    .start-subtitle {
      font-size: clamp(12px, 1.1vw, 15px);
      font-weight: 400;
      color: rgba(237, 250, 255, 0.74);
      margin-bottom: 34px;
    }
    .input-group { margin-bottom: 13px; }
    .input-group input {
      width: 100%;
      padding: 15px 18px;
      font-size: clamp(13px, 1.05vw, 15px);
      font-family: inherit;
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.96);
      border: 2px solid transparent;
      border-radius: 12px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-group input::placeholder { color: var(--text-muted); }
    .input-group input:focus {
      border-color: rgba(255, 255, 255, 0.86);
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.20);
    }
    #start-quiz-btn {
      width: 100%;
      margin-top: 8px;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: #FFFFFF;
      color: var(--primary);
      font-family: inherit;
      font-size: clamp(13px, 1.15vw, 16px);
      font-weight: 700;
      letter-spacing: -0.2px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
      box-shadow: 0 8px 20px rgba(2, 32, 48, 0.20);
    }
    #start-quiz-btn:hover {
      background: #F3FBFF;
      transform: translateY(-2px);
      box-shadow: 0 12px 26px rgba(2, 32, 48, 0.24);
    }

    #quiz-page {
      display: none;
      grid-template-rows: 1fr auto;
      height: 100vh;
      padding: clamp(12px, 1.8vh, 22px) clamp(14px, 2vw, 26px);
      gap: clamp(8px, 1.1vh, 12px);
      overflow: hidden;
    }
    .quiz-top {
      display: grid;
      grid-template-columns: minmax(0, 1.55fr) minmax(0, 1fr);
      gap: clamp(8px, 0.8vw, 12px);
      min-height: 0;
      align-items: stretch;
    }
    .tablet-video-panel {
      display: contents;
    }
    #video-container {
      min-height: 0;
      border-radius: var(--radius-lg);
      background: linear-gradient(160deg, #EEF5FA 0%, #E6EEF5 100%);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
      border: 1px solid #D6E0E9;
      display: flex;
      flex-direction: column;
    }
    .video-wrapper {
      width: 100%;
      flex: 1 1 auto;
      min-height: 0;
      position: relative;
    }
    .video-wrapper > div {
      position: absolute !important;
      inset: 0 !important;
      padding: 0 !important;
    }
    .video-wrapper iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    #quiz-container {
      min-height: 0;
      background: rgba(255, 255, 255, 0.92);
      border-radius: var(--radius-lg);
      border: 1px solid #D8E2EB;
      box-shadow: var(--shadow-card);
      padding: clamp(12px, 1.5vh, 18px) clamp(12px, 1.5vw, 18px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    #quiz-content {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      padding-right: 4px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
      display: flex;
      flex-direction: column;
    }
    .question-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: clamp(10px, 1.3vh, 14px);
    }
    .q-num-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 14px;
      border-radius: 999px;
      background: linear-gradient(120deg, var(--primary) 0%, #0E8FB2 100%);
      color: #FFFFFF;
      font-size: clamp(11px, 0.9vw, 13px);
      font-weight: 700;
      letter-spacing: 0.1px;
    }
    #quiz-content h3 {
      font-size: clamp(15px, 1.55vw, 21px);
      font-weight: 700;
      line-height: 1.64;
      color: var(--text-primary);
      margin-bottom: clamp(10px, 1.2vh, 14px);
      padding: clamp(12px, 1.4vh, 16px);
      background: #EDF7FC;
      border: 1px solid #CAE8F4;
      border-left: 5px solid var(--primary-light);
      border-radius: 11px;
    }

    #options {
      display: flex;
      flex-direction: column;
      gap: clamp(6px, 0.7vh, 10px);
      flex: 1 1 auto;
    }
    #options label {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: clamp(10px, 1.1vh, 13px) clamp(12px, 1.2vw, 16px);
      background: #FFFFFF;
      border: 1.5px solid #CDD8E2;
      border-radius: 10px;
      cursor: pointer;
      font-size: clamp(16px, 1.65vw, 23px);
      font-weight: 500;
      line-height: 1.5;
      color: var(--text-primary);
      transition: border-color 0.15s, transform 0.15s, background 0.15s;
      word-break: keep-all;
      white-space: normal;
    }
    #options label:hover {
      background: #F2FAFE;
      border-color: #9ED5E8;
      transform: translateX(2px);
    }
    #options input[type="radio"] {
      width: 17px;
      height: 17px;
      flex-shrink: 0;
      accent-color: var(--primary);
    }
    #options label:has(input:checked) {
      background: linear-gradient(135deg, #0A6A87 0%, #0E8FB2 100%);
      border-color: #0A6A87;
      color: #FFFFFF;
      box-shadow: 0 8px 18px rgba(8, 97, 126, 0.24);
    }
    #options label:has(input:checked) span {
      color: #FFFFFF;
      font-weight: 600;
    }

    #navigation-buttons {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: clamp(12px, 1.6vh, 18px);
      padding-top: clamp(12px, 1.6vh, 16px);
      border-top: 1px solid #D3DEE7;
    }
    #navigation-buttons button {
      min-width: 96px;
      padding: clamp(8px, 1vh, 11px) clamp(14px, 1.4vw, 20px);
      border-radius: 10px;
      font-family: inherit;
      font-size: clamp(12px, 1vw, 14px);
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
    }
    #prev-btn {
      border: 1.5px solid #C7D4DE;
      background: #FFFFFF;
      color: var(--text-secondary);
    }
    #prev-btn:hover:not(:disabled) {
      background: #F0F7FB;
      color: var(--text-primary);
      transform: translateY(-1px);
      box-shadow: 0 5px 12px rgba(34, 66, 94, 0.10);
    }
    #prev-btn:disabled { opacity: 0.38; cursor: not-allowed; }
    #next-btn {
      border: none;
      background: linear-gradient(120deg, var(--primary) 0%, #0E8FB2 100%);
      color: #FFFFFF;
      box-shadow: 0 6px 14px rgba(0, 93, 122, 0.28);
    }
    #next-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 18px rgba(0, 93, 122, 0.30);
    }
    #next-btn.submit-mode {
      background: linear-gradient(120deg, #AF342F 0%, #D4574B 100%);
      box-shadow: 0 6px 14px rgba(175, 52, 47, 0.26);
    }
    #next-btn.submit-mode:hover {
      box-shadow: 0 10px 18px rgba(175, 52, 47, 0.30);
    }

    #question-counter {
      font-size: clamp(12px, 1.05vw, 14px);
      font-weight: 700;
      color: var(--text-secondary);
    }
    #total-questions { color: var(--primary); }

    #quick-nav-container {
      display: none;
      flex-direction: column;
      justify-content: center;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid #D3DDE6;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      padding: clamp(10px, 1.4vh, 15px) clamp(12px, 1.5vw, 20px);
      overflow: hidden;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .nav-header {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: clamp(6px, 0.8vh, 10px);
    }
    .nav-section-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 17px;
      border-radius: 999px;
      background: linear-gradient(120deg, var(--primary) 0%, #0E8FB2 100%);
      color: #FFFFFF;
      font-size: clamp(12px, 1vw, 14px);
      font-weight: 700;
      letter-spacing: 0.3px;
      text-align: center;
    }
    #quick-nav-grid-wrap {
      display: flex;
      align-items: center;
      gap: clamp(6px, 0.8vw, 10px);
      overflow: hidden;
    }
    #quick-nav-grid {
      display: grid;
      flex: 1 1 auto;
      min-width: 0;
      grid-template-columns: repeat(10, minmax(0, 1fr));
      gap: clamp(3px, 0.35vw, 5px);
    }
    #quick-nav-grid-wrap .nav-arrow {
      flex: 0 0 34px !important;
      width: 34px !important;
      min-width: 34px !important;
      max-width: 34px !important;
      height: var(--quick-nav-btn-height, var(--nav-btn-height, 34px)) !important;
      min-height: var(--quick-nav-btn-height, var(--nav-btn-height, 34px)) !important;
      padding: 0 !important;
      border: none;
      border-radius: 9px;
      background: linear-gradient(120deg, var(--primary) 0%, #0E8FB2 100%);
      color: #FFFFFF;
      font-size: 14px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
    }
    #quick-nav-grid-wrap .nav-arrow:hover:not(:disabled) { transform: scale(1.06); }
    #quick-nav-grid-wrap .nav-arrow:disabled { opacity: 0.35; cursor: not-allowed; }

    .nav-btn {
      height: var(--nav-btn-height, 28px);
      line-height: var(--nav-btn-height, 28px);
      padding: 0;
      border-radius: 7px;
      border: 1px solid #C5D1DB;
      background: #FFFFFF;
      color: var(--text-secondary);
      font-family: inherit;
      font-size: clamp(10px, 0.85vw, 13px);
      font-weight: 700;
      text-align: center;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s, color 0.12s, transform 0.12s;
      overflow: hidden;
      white-space: nowrap;
      user-select: none;
      -webkit-user-select: none;
    }
    .nav-btn .nav-number,
    .nav-btn .nav-answer {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      line-height: 1;
    }
    .nav-btn .nav-answer {
      margin-left: 4px;
      color: currentColor;
      font-size: inherit;
      font-weight: 900;
      line-height: 1;
      vertical-align: baseline;
    }
    .nav-btn:not(.answered) .nav-answer { display: none; }
    .nav-btn.answered .nav-answer,
    .nav-btn.active.answered .nav-answer {
      color: var(--success);
    }
    .nav-btn:hover {
      background: #E9F7FD;
      border-color: #97D4E8;
      color: var(--primary);
      transform: translateY(-1px);
    }
    .nav-btn.active {
      background: linear-gradient(120deg, var(--primary) 0%, #0E8FB2 100%);
      color: #FFFFFF;
      border-color: #0B7FA1;
    }
    .nav-btn.answered {
      background: var(--success-subtle);
      color: var(--success);
      border-color: #83D5A8;
    }
    .nav-btn.active.answered {
      background: var(--success-subtle);
      color: var(--success);
      border-color: #83D5A8;
    }
    .nav-btn.correct {
      background: var(--success-subtle) !important;
      color: var(--success) !important;
      border-color: #83D5A8 !important;
    }
    .nav-btn.incorrect {
      background: var(--danger-subtle) !important;
      color: var(--danger) !important;
      border-color: #F0B1AC !important;
    }

    #result-page {
      display: none;
      flex-direction: column;
      align-items: center;
      position: fixed;
      inset: 0;
      padding: clamp(14px, 2.2vh, 26px) clamp(10px, 2vw, 24px);
      background:
        radial-gradient(circle at 12% 16%, rgba(42, 142, 181, 0.16) 0%, transparent 34%),
        radial-gradient(circle at 86% 78%, rgba(0, 93, 122, 0.12) 0%, transparent 40%),
        linear-gradient(180deg, #EEF4FA 0%, #E4ECF4 100%);
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      gap: clamp(10px, 1.8vh, 16px);
    }
    #result-page > .result-emoji,
    #result-page > h2,
    #result-page > #score,
    #result-page > #quick-nav-container-result,
    #result-page > #result-return-btn {
      width: min(100%, 1120px);
    }
    .result-emoji {
      display: block;
      text-align: center;
      font-size: clamp(34px, 4.5vw, 52px);
      line-height: 1;
      margin: 0;
    }
    #result-page h2 {
      text-align: center;
      font-size: clamp(22px, 2.6vw, 34px);
      color: var(--text-primary);
      font-weight: 800;
      letter-spacing: -0.5px;
      margin: 0;
    }
    #score {
      text-align: center;
      margin: 0;
      font-size: clamp(13px, 1.3vw, 17px);
      font-weight: 700;
      color: var(--primary);
      background: rgba(255, 255, 255, 0.90);
      border: 1.5px solid #BEE5F3;
      border-radius: 14px;
      padding: clamp(11px, 1.8vh, 16px) clamp(14px, 2vw, 28px);
      box-shadow: var(--shadow-card);
      word-break: keep-all;
    }

    #result-shell {
      width: min(100%, 1120px);
      display: flex;
      flex-direction: column;
      gap: clamp(10px, 1.8vh, 16px);
      margin: 0 auto;
    }
    .result-summary-card {
      position: sticky;
      top: 0;
      z-index: 3;
      text-align: center;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid #CFDDE8;
      border-radius: 16px;
      box-shadow: var(--shadow-card);
      padding: clamp(14px, 2vh, 20px) clamp(14px, 2vw, 24px);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .result-summary-card .result-emoji,
    .result-summary-card h2,
    .result-summary-card #score {
      width: 100%;
    }

    #quick-nav-container-result {
      width: min(100%, 1120px);
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid #CFDDE8;
      border-radius: 16px;
      box-shadow: var(--shadow-card);
      padding: clamp(12px, 1.9vh, 18px) clamp(10px, 1.8vw, 18px);
      overflow-x: clip;
    }
    .result-grid-title {
      text-align: center;
      margin-bottom: 10px;
      font-size: clamp(11px, 1vw, 13px);
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    #quick-nav-grid-result {
      display: grid;
      grid-template-columns: repeat(10, minmax(0, 1fr));
      gap: clamp(4px, 0.45vw, 7px);
      width: 100%;
      margin-bottom: 0;
    }
    #quick-nav-grid-result .nav-btn {
      height: auto;
      min-height: 58px;
      line-height: 1.1;
      padding: clamp(6px, 0.9vh, 9px) clamp(3px, 0.45vw, 6px);
      border-radius: 9px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      min-width: 0;
      overflow: hidden;
      cursor: default;
      transform: none;
    }
    #quick-nav-grid-result .nav-btn:hover { transform: none; }
    #quick-nav-grid-result .nav-btn .number {
      font-size: clamp(11px, 1.2vw, 15px);
      font-weight: 800;
      line-height: 1;
    }
    #quick-nav-grid-result .nav-btn .detail {
      font-size: clamp(8.5px, 0.85vw, 10px);
      line-height: 1.2;
      opacity: 0.92;
      white-space: nowrap;
      text-overflow: ellipsis;
      overflow: hidden;
      max-width: 100%;
      display: block;
    }
    #quick-nav-grid-result .nav-btn .detail-c,
    #quick-nav-grid-result .nav-btn .detail-m {
      display: block;
      line-height: 1.1;
      white-space: nowrap;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #quick-nav-grid-result .nav-btn .detail-c { font-weight: 700; }
    #quick-nav-grid-result .nav-btn .detail-m { font-weight: 600; opacity: 0.9; }
    #quick-nav-grid-result.compact .nav-btn {
      min-height: 62px;
      padding: 9px 5px;
      gap: 2px;
    }

    #result-return-btn {
      width: min(100%, 420px);
      margin: 2px auto 0;
      padding: 14px 20px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(120deg, var(--primary) 0%, #0E8FB2 100%);
      color: #FFFFFF;
      font-family: inherit;
      font-size: clamp(14px, 1.35vw, 16px);
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0, 93, 122, 0.28);
      transition: transform 0.2s, box-shadow 0.2s;
      position: sticky;
      bottom: max(6px, env(safe-area-inset-bottom));
      z-index: 2;
    }
    #result-return-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(0, 93, 122, 0.31);
    }

    @media (max-width: 1180px) {

    function fitQuestionText(){

        const availableHeight=Math.max(180,navTop-optionsRect.top-10);
        const gap=Math.max(8,Math.min(14,availableHeight*0.018));

        optionsWrap.style.setProperty("--tablet-option-gap",gap+"px");
        optionsWrap.style.setProperty("--tablet-option-padding-y",Math.max(phoneLandscape?6:8,Math.min(phoneLandscape?9:14,cardHeight*0.18))+"px");

      if(quizContentScrollFrame)cancelAnimationFrame(quizContentScrollFrame);
      quizContentScrollFrame=requestAnimationFrame(()=>{
        quizContentScrollFrame=0;
        updateQuizContentScrollState();

    function enableQuizContentTouchScroll(){
      const scroller=document.getElementById("quiz-content");
      if(!scroller||scroller.dataset.touchScrollInit==="1")return;

      let lastY=0;
      let moved=false;
      scroller.addEventListener("touchstart",e=>{
        if(e.touches.length!==1)return;
        lastY=e.touches[0].clientY;
        moved=false;
      },{passive:true});
      scroller.addEventListener("touchmove",e=>{
        if(e.touches.length!==1)return;
        if(scroller.classList.contains("no-scroll-needed")||scroller.scrollHeight<=scroller.clientHeight+1){
          e.preventDefault();
          e.stopPropagation();
          return;
        }
        const y=e.touches[0].clientY;
        const delta=lastY-y;
        if(Math.abs(delta)>1){
          scroller.scrollTop+=delta;
          lastY=y;
          moved=true;
          e.preventDefault();
          e.stopPropagation();
        }
      },{passive:false});
      scroller.addEventListener("click",e=>{
        if(moved){
          e.preventDefault();
          e.stopPropagation();
          moved=false;
        }
      },true);
      scroller.dataset.touchScrollInit="1";
    }

    const quizData=quizRawData.map(item=>({...item,videoEmbed:getVideoEmbed(item.videoId,item.number)}));
    const TOTAL_QUESTIONS=quizData.length;
    let currentQuestionIndex=0,currentUserId="",currentUserName="",userAnswers=new Array(TOTAL_QUESTIONS).fill(null);
    function makeVideoViewKey(value) {
      return String(value || "unknown").replace(/[.#$\[\]\/]/g, "_");
    }

    function getVideoViewQuestionNumber(question) {
      const rawNumber = question && question.number !== undefined ? question.number : currentQuestionIndex + 1;
      const parsed = Number(String(rawNumber).replace(/[^0-9]/g, ""));
      return Number.isFinite(parsed) && parsed > 0 ? parsed : currentQuestionIndex + 1;
    }

    function getVideoViewMeta(question) {
      const examId = String(EXAM_ID || "unknown");
      const contentType = examId.indexOf("quiz") === 0 ? "quiz1400" : "mockExam";
      const contentNumber = (examId.match(/\d+/) || [""])[0];
      const contentLabel = contentType === "quiz1400" ? "1400\uc81c " + contentNumber + "\ubd80" : contentNumber + "\ud68c \ubaa8\uc758\uace0\uc0ac";
      const questionNumber = getVideoViewQuestionNumber(question);
      return {
        contentType,
        examId,
        contentLabel,
        questionNumber,
        questionKey: "q" + String(questionNumber).padStart(3, "0"),
        videoId: String(question && question.videoId || "")
      };
    }

    function updateVideoViewCounter(ref, payload) {
      return ref.transaction(data => {
        const current = data && typeof data === "object" ? data : {};
        const playCount = (Number(current.playCount) || 0) + 1;
        return Object.assign({}, current, payload, {
          playCount,
          firstPlayedAt: current.firstPlayedAt || payload.lastPlayedAt,
          lastPlayedAt: payload.lastPlayedAt
        });
      });
    }

    function recordVideoPlay(question) {
      if (!currentUserId || !EXAM_ID || !question || !question.videoId || !database) return;
      const meta = getVideoViewMeta(question);
      const uidKey = makeVideoViewKey(currentUserId);
      const examKey = makeVideoViewKey(meta.examId);
      const now = Date.now();
      const payload = {
        uid: String(currentUserId),
        name: String(currentUserName || "").trim().replace(/\s+/g, " "),
        contentType: meta.contentType,
        examId: meta.examId,
        contentLabel: meta.contentLabel,
        questionNumber: meta.questionNumber,
        questionKey: meta.questionKey,
        videoId: meta.videoId,
        lastPlayedAt: now
      };
      const userPath = "videoViews/byUser/" + uidKey + "/" + meta.contentType + "/" + examKey + "/questions/" + meta.questionKey;
      const contentPath = "videoViews/byContent/" + meta.contentType + "/" + examKey + "/questions/" + meta.questionKey + "/users/" + uidKey;
      Promise.all([
        updateVideoViewCounter(database.ref(userPath), payload),
        updateVideoViewCounter(database.ref(contentPath), payload)
      ]).catch(() => {});
    }

    function attachVideoTracking(question) {
      const iframe = videoWrapper && videoWrapper.querySelector("iframe");
      if (!iframe || !window.Vimeo || typeof window.Vimeo.Player !== "function") return;
      try {
        const player = new Vimeo.Player(iframe);
        player.on("play", () => recordVideoPlay(question));
      } catch (error) {}
    }


    function syncResultUserName(name){
      const resultUserName=document.getElementById("result-user-name");
      if(resultUserName)resultUserName.textContent=name?("\uC751\uC2DC\uC790 : "+name):"";
    }

    function normalizeUserNameForIdentity(name){
      return String(name||"").trim().replace(/\s+/g," ");
    }

    function getCurrentUserName(){
      return normalizeUserNameForIdentity((userNameInput&&userNameInput.value)||currentUserName||"");
    }

    function getStoredUserName(data){
      if(!data)return "";
      return normalizeUserNameForIdentity(
        (data.profile&&data.profile.name)||
        data.name||
        (data.result&&data.result.name)||
        (data.progress&&data.progress.name)||
        ""
      );
    }

    function hasStoredNameMismatch(data,name){
      const stored=getStoredUserName(data);
      return Boolean(stored&&stored!==normalizeUserNameForIdentity(name));
    }

    function getMockExamScopeKey(){
      return EXAM_ID;
    }

    function getAuthorizationErrorMessage(error){
      if(error&&error.code==="invalid-uid")return "아이디에는 . # $ [ ] / 문자를 사용할 수 없습니다.";
      if(error&&error.code==="not-registered")return "등록되지 않은 아이디입니다. 관리자에게 문의해 주세요.";
      if(error&&error.code==="disabled")return "사용이 중지된 아이디입니다. 관리자에게 문의해 주세요.";
      if(error&&error.code==="name-mismatch")return "아이디와 이름이 등록 정보와 일치하지 않습니다. 다시 확인해 주세요.";
      if(error&&error.code==="scope-denied")return "입력하신 정보는 해당 모의고사에 등록되어 있지 않습니다. 관리자에게 문의해 주세요.";
      return "등록 정보를 확인하지 못했습니다. 잠시 후 다시 시도해 주세요.";
    }

    function showAuthorizationDenied(message){
      alert(message);
      currentUserId="";
      currentUserName="";
      document.body.innerHTML='<main style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:#EFF6F8;font-family:Arial, sans-serif;"><section style="width:min(520px,100%);background:#fff;border:1px solid #D9E3EA;border-radius:12px;padding:28px;text-align:center;box-shadow:0 18px 42px rgba(15,54,74,.14);"><h1 style="margin:0 0 12px;font-size:24px;color:#17202A;">입장할 수 없습니다</h1><p style="margin:0;color:#475569;font-size:16px;line-height:1.6;font-weight:700;">'+message+'</p></section></main>';
    }

    function hasAuthorizedMockScope(data){
      const scopes=(data&&data.allowedScopes&&data.allowedScopes.mockExam)||{};
      return Boolean(data&&data.enabled!==false&&(scopes.all===true||scopes[getMockExamScopeKey()]===true));
    }

    function verifyAuthorizedUser(uid,name){
      const normalized=normalizeUserNameForIdentity(name);
      if(/[.#$\[\]\/]/.test(String(uid||""))){const err=new Error("invalid uid");err.code="invalid-uid";return Promise.reject(err);}
      return database.ref('authorizedUsers/'+uid).once("value").then(snapshot=>{
        const data=snapshot.val();
        if(!data){const err=new Error("not registered");err.code="not-registered";throw err;}
        if(data.enabled===false){const err=new Error("disabled");err.code="disabled";throw err;}
        if(normalizeUserNameForIdentity(data.name)!==normalized){const err=new Error("name mismatch");err.code="name-mismatch";throw err;}
        if(!hasAuthorizedMockScope(data)){const err=new Error("scope denied");err.code="scope-denied";throw err;}
        return data;
      });
    }

    function showIdentityMismatch(){
      alert("\uC544\uC774\uB514\uC640 \uC774\uB984\uC774 \uC800\uC7A5\uB41C \uC815\uBCF4\uC640 \uC77C\uCE58\uD558\uC9C0 \uC54A\uC2B5\uB2C8\uB2E4. \uB2E4\uC2DC \uD655\uC778\uD574 \uC8FC\uC138\uC694.");
      startPage.style.display="flex";
      quizPage.style.display="none";
      resultPage.style.display="none";
      currentUserId="";
      currentUserName="";
    }

    function saveUserIdentity(userRef,uid,name,data){
      const normalized=normalizeUserNameForIdentity(name);
      const updates={
        uid:String(uid||""),
        name:normalized,
        "profile/uid":String(uid||""),
        "profile/name":normalized,
        "profile/updatedAt":firebase.database.ServerValue.TIMESTAMP
      };
      if(data&&data.result){
        updates["result/uid"]=String(uid||"");
        updates["result/name"]=normalized;
      }
      if(data&&data.progress){
        updates["progress/uid"]=String(uid||"");
        updates["progress/name"]=normalized;
      }
      return userRef.update(updates);
    }

    let currentNavPage=0;

    function startQuiz(uid,userName){
      currentUserId=uid;
      currentUserName=normalizeUserNameForIdentity(userName||userNameInput.value.trim()||"");
      if(userNameInput)userNameInput.value=currentUserName;
      syncResultUserName(currentUserName);
      const userRef=database.ref(`exams/${EXAM_ID}/users/${uid}`);
      verifyAuthorizedUser(uid,currentUserName).then(()=>{
        userRef.once("value").then(snapshot=>{
          const data=snapshot.val();
          saveUserIdentity(userRef,uid,currentUserName,data).then(()=>{
            if(data&&data.result){
              startPage.style.display="none";resultPage.style.display="flex";
              if(data.result.answers)userAnswers=data.result.answers;
              document.getElementById("quick-nav-container-result").style.display="block";renderResultNav();
            }else if(data&&data.progress){
              currentQuestionIndex=data.progress.currentQuestion||0;
              userAnswers=data.progress.answers||new Array(TOTAL_QUESTIONS).fill(null);showQuizPage();
            }else{currentQuestionIndex=0;userAnswers=new Array(TOTAL_QUESTIONS).fill(null);showQuizPage();}
          }).catch(()=>{alert("사용자 정보를 저장하지 못했습니다. 잠시 후 다시 시도해 주세요.");});
        }).catch(()=>{alert("사용자 정보를 확인하지 못했습니다. 잠시 후 다시 시도해 주세요.");});
      }).catch(error=>{showAuthorizationDenied(getAuthorizationErrorMessage(error));});
    }


    function buildQuizLaunchUrl(uid,userName){
      const target=new URL(window.location.href);
      target.searchParams.set("uid",uid);
      target.searchParams.set("name",userName);
      return target.href;
    }

    function hasQuizLaunchParams(){
      const params=new URLSearchParams(window.location.search);
      return Boolean(params.get("uid")&&params.get("name"));
    }

    function openQuizLaunchWindow(uid,userName){
      if(hasQuizLaunchParams()){startQuiz(uid,userName);return;}
      const opened=window.open(buildQuizLaunchUrl(uid,userName),"_blank");
      if(!opened){
        alert("\uC0C8 \uCC3D\uC774 \uCC28\uB2E8\uB418\uC5C8\uC2B5\uB2C8\uB2E4. \uBE0C\uB77C\uC6B0\uC800\uC758 \uD31D\uC5C5 \uCC28\uB2E8\uC744 \uD574\uC81C\uD55C \uB4A4 \uB2E4\uC2DC \uC2DC\uB3C4\uD574\uC8FC\uC138\uC694.");
      }
    }

    function showQuizPage(){
      startPage.style.display="none";quizPage.style.display="flex";
      updateQuizViewportHeight();
      initQuickNavBottomBar();
      enableQuizContentTouchScroll();
      document.getElementById("quick-nav-container").style.display="flex";
      closeQuickNavPanel();
      createQuickNavButtons();updateQuestion(currentQuestionIndex);
      requestAnimationFrame(()=>{
        applyResponsiveLayout();
        fitQuestionText();
        fitOptionsText();
        requestAnimationFrame(()=>{
          autoResizeNavGrid();
          requestAnimationFrame(autoResizeNavGrid);
        });
      });
    }

    function saveQuizProgress(){
      if(!currentUserId)return;
      currentUserName=getCurrentUserName();
      database.ref(`exams/${EXAM_ID}/users/${currentUserId}/progress`).set({uid:currentUserId,name:currentUserName,currentQuestion:currentQuestionIndex,answers:userAnswers});
    }

    function setQuickNavButtonLabel(btn,no,answer){
      const hasAnswer=answer!==null&&answer!==undefined&&answer!=="";
      const numberText=String(no);
      const answerText=hasAnswer?String(answer):"";
      const label=hasAnswer?numberText+" ["+answerText+"]":numberText;
      btn.dataset.label=label;
      btn.innerHTML=hasAnswer?'<span class="nav-number">'+numberText+'</span><span class="nav-answer">['+answerText+']</span>':'<span class="nav-number">'+numberText+'</span>';
      btn.setAttribute("aria-label",label);
    }

    function updateQuestion(index){
      currentQuestionIndex=index;
      const question=quizData[currentQuestionIndex];
      videoWrapper.innerHTML=question.videoEmbed;
      attachVideoTracking(question);
      requestAnimationFrame(applyResponsiveLayout);
      questionNumberSpan.textContent=currentQuestionIndex+1;
      questionTextSpan.textContent=question.question;
      currentQuestionSpan.textContent=currentQuestionIndex+1;
      totalQuestionsSpan.textContent=TOTAL_QUESTIONS;
      requestAnimationFrame(fitQuestionText);
      requestAnimationFrame(fitOptionsText);
      optionsDiv.innerHTML="";
      question.options.forEach((option,i)=>{
        const label=document.createElement("label");
        label.innerHTML=`<input type="radio" name="answer" value="${i+1}"><span>${option}</span>`;
        optionsDiv.appendChild(label);
      });
      if(userAnswers[currentQuestionIndex]!==null){
        const r=optionsDiv.querySelector(`input[value="${userAnswers[currentQuestionIndex]}"]`);
        if(r)r.checked=true;
      }
      const quizContentEl=document.getElementById("quiz-content");
      if(quizContentEl)quizContentEl.scrollTop=0;
      requestAnimationFrame(()=>{
        fitQuestionText();
        fitOptionsText();
        scheduleQuizContentScrollState();
      });
      currentNavPage=Math.floor(currentQuestionIndex/getNavPageSize());
      updateNavDisplay();
      prevBtn.disabled=currentQuestionIndex===0;
      nextBtn.textContent=currentQuestionIndex===TOTAL_QUESTIONS-1?"제출하기":"다음 →";
      if(currentQuestionIndex===TOTAL_QUESTIONS-1)nextBtn.classList.add("submit-mode");
      else nextBtn.classList.remove("submit-mode");
    }

    function updateNavDisplay(){
      quickNavGrid.innerHTML="";
      const totalPages=Math.max(1,Math.ceil(TOTAL_QUESTIONS/getNavPageSize()));
      currentNavPage=Math.max(0,Math.min(currentNavPage,totalPages-1));
      const start=currentNavPage*getNavPageSize();
      for(let i=0,pageSize=getNavPageSize();i<pageSize;i++){
        const realIndex=start+i;
        const btn=document.createElement("div");
        btn.classList.add("nav-btn");
        if(realIndex<TOTAL_QUESTIONS){
          const ans=userAnswers[realIndex];
          const hasAnswer=ans!==null&&ans!==undefined&&ans!=="";
          setQuickNavButtonLabel(btn,realIndex+1,ans);
          btn.dataset.q=realIndex;
          if(realIndex===currentQuestionIndex)btn.classList.add("active");
          if(hasAnswer)btn.classList.add("answered");
          btn.draggable=false;
          btn.addEventListener("mousedown",e=>e.preventDefault());
        }else{
          btn.classList.add("placeholder");
          btn.style.opacity="0";
          btn.style.pointerEvents="none";
        }
        quickNavGrid.appendChild(btn);
      }
      const showArrows=totalPages>1;
      if(navPrevBtn){navPrevBtn.style.display=showArrows?"flex":"none";navPrevBtn.disabled=currentNavPage===0;}
      if(navNextBtn){navNextBtn.style.display=showArrows?"flex":"none";navNextBtn.disabled=currentNavPage>=totalPages-1;}
    }

    function createQuickNavButtons(){
      updateNavDisplay();
    }

    function disableAnswers(){
      optionsDiv.querySelectorAll("input[type=radio]").forEach(r=>r.disabled=true);
      quickNavGrid.style.pointerEvents="none";
    }

    function notifyMockExamComplete(){
      const state=getExamCompletionState();
      if(!state.eligible)return;
      try{
        if(!window.opener||window.opener.closed)return;
        window.opener.postMessage({
          type:"mockExamComplete",
          examId:EXAM_ID,
          uid:String(currentUserId||userIdInput.value.trim()||""),
          name:String(userNameInput.value.trim()||currentUserName||""),
          completed:state.completed,
          passed:state.passed,
          eligible:state.eligible,
          total:state.stats.correct,
          written:state.stats.written,
          practical:state.stats.practical,
          totalQuestions:TOTAL_QUESTIONS,
          answers:userAnswers.slice(),
          correctAnswers:quizData.map(item=>item.correctAnswer)
        },"*");
      }catch(e){}
    }

    function submitQuiz(){
      let 필기=0,실기=0;
      quizData.forEach((item,i)=>{
        if(userAnswers[i]&&userAnswers[i]==item.correctAnswer){if(i<35)필기++;else 실기++;}
      });
      const 총점=필기+실기;
      const 합격여부 = (필기 >= 21 && 실기 >= 27) ? "합격" : "불합격";
      quizPage.style.display="none";resultPage.style.display="flex";
      currentUserName=getCurrentUserName();
      syncResultUserName(currentUserName);
      if(currentUserId){
        const ref=database.ref(`exams/${EXAM_ID}/users/${currentUserId}`);
        ref.child("result").set({uid:currentUserId,name:getCurrentUserName(),total:총점,필기,실기,totalQuestions:TOTAL_QUESTIONS,answers:userAnswers});
        ref.child("progress").remove();
      }
      renderResultNav();disableAnswers();notifyMockExamComplete();alert("제출 완료하였습니다!");
      const googleFormURL="https://docs.google.com/forms/d/e/1FAIpQLSfmdzft5Xpy3UPoRQ0-e9iN1JAnG_NnAdXmMZwKz04inJDqzQ/formResponse";
      const fd=new FormData();
      fd.append("entry.295783163",userNameInput.value.trim());
      fd.append("entry.516479247",`${총점}점 ( 필기: ${필기}점 / 실기: ${실기}점 )`);
      fd.append("entry.516661777", 합격여부);
      fetch(googleFormURL,{method:"POST",body:fd,mode:"no-cors", keepalive: true }).catch(console.error);
    }
    function getLearningCompleteMessage(){
      const isMobile=window.matchMedia&&window.matchMedia("(max-width: 700px), (pointer: coarse)").matches;
      return isMobile
        ? "화면 아래의 '학습을 완료합니다.' 버튼을 누르세요.\n↓"
        : "화면 아래의 '학습을 완료합니다.' 버튼을 누르세요. ↘";
    }

    function completeLearning(){
      const state=getExamCompletionState();
      if(!state.eligible){
        updateResultCompleteButton(state);
        alert(getCompletionBlockedMessage(state));
        return;
      }
      notifyMockExamComplete();
      try{ if(window.opener&&!window.opener.closed)window.opener.focus(); }catch(e){}
      try{ window.close(); }catch(e){}
      setTimeout(()=>{ if(!window.closed)alert(getLearningCompleteMessage()); },250);
    }

    function resetQuiz(){
      if(!currentUserId){location.reload();return;}
      alert("초기화되었습니다!");
      const ref=database.ref(`exams/${EXAM_ID}/users/${currentUserId}`);
      ref.child("progress").remove().then(()=>ref.child("result").remove()).then(()=>{
        resultPage.style.display="none";currentQuestionIndex=0;
        userAnswers=new Array(TOTAL_QUESTIONS).fill(null);showQuizPage();
        quickNavGrid.style.pointerEvents="auto";
      });
    }

    function normalizeResultAnswers(answers){
      const arr=new Array(TOTAL_QUESTIONS).fill(null);
      if(Array.isArray(answers)){
        for(let i=0;i<TOTAL_QUESTIONS;i++)arr[i]=answers[i]??null;
      }else if(answers&&typeof answers==="object"){
        Object.keys(answers).forEach(function(k){
          const idx=parseInt(k,10);
          if(idx>=0&&idx<TOTAL_QUESTIONS)arr[idx]=answers[k];
        });
      }
      return arr;
    }

    function analyzeExamResultAnswers(){
      userAnswers=normalizeResultAnswers(userAnswers);
      const stats={written:0,practical:0,correct:0,wrong:[],empty:[]};
      quizData.forEach(function(q,i){
        const raw=userAnswers[i];
        const mine=(raw===null||raw===undefined||raw==="")?"-":raw;
        const ok=mine!=="-"&&parseInt(mine,10)===parseInt(q.correctAnswer,10);
        if(ok){
          stats.correct++;
          if(i<35)stats.written++;
          else stats.practical++;
        }else if(mine==="-"){
          stats.empty.push({no:i+1,correct:q.correctAnswer,mine:mine});
        }else{
          stats.wrong.push({no:i+1,correct:q.correctAnswer,mine:mine});
        }
      });
      return stats;
    }

    function getExamCompletionState(){
      const stats=analyzeExamResultAnswers();
      const completed=stats.empty.length===0;
      const passed=stats.written>=21&&stats.practical>=27;
      return {stats,completed,passed,eligible:completed&&passed};
    }

    function updateResultCompleteButton(state){
      const btn=document.getElementById("result-complete-btn");
      if(!btn)return;
      const currentState=state||getExamCompletionState();
      btn.style.display=currentState.eligible?"block":"none";
      btn.disabled=!currentState.eligible;
      btn.setAttribute("aria-hidden",currentState.eligible?"false":"true");
    }

    function getCompletionBlockedMessage(state){
      const currentState=state||getExamCompletionState();
      if(!currentState.completed)return "모든 문항을 풀고 합격해야 학습 완료를 할 수 있습니다.";
      if(!currentState.passed)return "합격 기준을 충족해야 학습 완료를 할 수 있습니다.";
      return "학습 완료 조건을 확인할 수 없습니다.";
    }

    function renderResultSummary(){
      const scoreEl=document.getElementById("score");
      if(!scoreEl)return;
      const stats=analyzeExamResultAnswers();
      const total=TOTAL_QUESTIONS;
      const rate=total?(stats.correct/total)*100:0;
      const isPassed=stats.written>=21&&stats.practical>=27;
      const statusNote=isPassed?"기준 통과":"재학습 필요";
      const resultUserName=document.getElementById("result-user-name");
      if(resultUserName){
        const name=getCurrentUserName();
        resultUserName.textContent=name?("응시자 : "+name):"";
      }
      scoreEl.className="result-summary "+(isPassed?"pass":"fail");
      scoreEl.innerHTML=''
        + '<div class="result-summary-main">'
        + '<div class="result-status-card">'
        + '<div class="result-status-label">'+(isPassed?"합격":"불합격")+'</div>'
        + '<div class="result-status-note">'+statusNote+'</div>'
        + '</div>'
        + '<div class="result-stats">'
        + '<div class="result-stat"><strong>'+rate.toFixed(1)+'%</strong><span>정답률</span></div>'
        + '<div class="result-stat"><strong>'+stats.correct+' / '+total+'</strong><span>정답</span></div>'
        + '<div class="result-stat"><strong>'+stats.wrong.length+'</strong><span>오답</span></div>'
        + '<div class="result-stat"><strong>'+stats.empty.length+'</strong><span>미응답</span></div>'
        + '</div>'
        + '</div>'
        + '<div class="result-standard"><span class="result-standard-line">필기 <strong>'+stats.written+' / 35</strong> · 실기 <strong>'+stats.practical+' / 45</strong></span><span class="result-standard-line">합격 기준 <strong>필기 21문항 이상</strong> · <strong>실기 27문항 이상</strong></span></div>';
      updateResultCompleteButton();
    }

    function escapeResultReviewHtml(value){
      return String(value??"").replace(/[&<>"']/g,function(ch){
        return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch];
      });
    }

    function buildResultReviewTooltipHtml(no,correct,mine){
      const q=quizData[no-1];
      if(!q)return "";
      const correctNo=parseInt(correct,10);
      const mineNo=parseInt(mine,10);
      const options=(q.options||[]).map(function(option,idx){
        const optionNo=idx+1;
        const isCorrect=optionNo===correctNo;
        const isSelected=optionNo===mineNo;
        const cls="result-review-tooltip-option"+(isCorrect?" correct":"")+(isSelected?" selected":"");
        const badge=isCorrect&&isSelected?"정답/선택":(isCorrect?"정답":(isSelected?"선택":""));
        return '<div class="'+cls+'"><span class="result-review-tooltip-option-no">'+optionNo+'</span><span class="result-review-tooltip-option-text">'+escapeResultReviewHtml(option)+'</span>'+(badge?'<span class="result-review-tooltip-badge">'+badge+'</span>':'')+'</div>';
      }).join("");
      return '<div class="result-review-tooltip-head"><strong>'+no+'번</strong><span>'+escapeResultReviewHtml(q.number||"")+'</span></div>'
        + '<p class="result-review-tooltip-question">'+escapeResultReviewHtml(q.question)+'</p>'
        + '<div class="result-review-tooltip-summary"><span class="correct">정답 '+escapeResultReviewHtml(correct)+'번</span><span class="selected">선택 '+escapeResultReviewHtml(mine)+'번</span></div>'
        + '<div class="result-review-tooltip-options">'+options+'</div>';
    }

    function ensureResultReviewTooltip(){
      let tooltip=document.getElementById("result-review-tooltip");
      if(!tooltip){
        tooltip=document.createElement("div");
        tooltip.id="result-review-tooltip";
        tooltip.className="result-review-tooltip";
        tooltip.setAttribute("role","tooltip");
        document.body.appendChild(tooltip);
      }
      return tooltip;
    }

    function positionResultReviewTooltip(tooltip,target){
      const margin=12;
      const rect=target.getBoundingClientRect();
      const tipRect=tooltip.getBoundingClientRect();
      let left=Math.min(Math.max(rect.left,margin),window.innerWidth-tipRect.width-margin);
      let top=rect.bottom+8;
      if(top+tipRect.height+margin>window.innerHeight)top=rect.top-tipRect.height-8;
      top=Math.min(Math.max(top,margin),window.innerHeight-tipRect.height-margin);
      tooltip.style.left=left+"px";
      tooltip.style.top=top+"px";
    }

    function showResultReviewTooltip(target){
      const no=parseInt(target.dataset.reviewNo,10);
      if(!no)return;
      const tooltip=ensureResultReviewTooltip();
      tooltip.innerHTML=buildResultReviewTooltipHtml(no,target.dataset.reviewCorrect,target.dataset.reviewMine);
      if(!tooltip.innerHTML)return;
      tooltip.classList.add("visible");
      positionResultReviewTooltip(tooltip,target);
    }

    function hideResultReviewTooltip(){
      const tooltip=document.getElementById("result-review-tooltip");
      if(tooltip)tooltip.classList.remove("visible");
    }

    function bindResultReviewTooltips(){
      document.querySelectorAll(".result-review-item[data-review-no]").forEach(function(item){
        item.addEventListener("mouseenter",function(){showResultReviewTooltip(item);});
        item.addEventListener("mousemove",function(){const tooltip=document.getElementById("result-review-tooltip");if(tooltip&&tooltip.classList.contains("visible"))positionResultReviewTooltip(tooltip,item);});
        item.addEventListener("mouseleave",hideResultReviewTooltip);
        item.addEventListener("focus",function(){showResultReviewTooltip(item);});
        item.addEventListener("blur",hideResultReviewTooltip);
      });
      if(!window.__resultReviewTooltipScrollBound){
        window.__resultReviewTooltipScrollBound=true;
        window.addEventListener("scroll",hideResultReviewTooltip,true);
        window.addEventListener("resize",hideResultReviewTooltip);
      }
    }

    window.showResultReviewTooltip=showResultReviewTooltip;
    window.hideResultReviewTooltip=hideResultReviewTooltip;

    function makeWrongReviewItem(item){
      return '<div class="result-review-item wrong" tabindex="0" data-review-no="'+item.no+'" data-review-correct="'+escapeResultReviewHtml(item.correct)+'" data-review-mine="'+escapeResultReviewHtml(item.mine)+'" aria-label="'+item.no+'번 오답 상세 보기" onmouseenter="showResultReviewTooltip(this)" onmousemove="showResultReviewTooltip(this)" onmouseleave="hideResultReviewTooltip()" onfocus="showResultReviewTooltip(this)" onblur="hideResultReviewTooltip()"><span class="review-no">'+item.no+'번</span><span class="review-answers"><span class="review-answer-correct">정답 '+item.correct+'번</span><span>선택 '+item.mine+'번</span></span></div>';
    }

    function renderWrongReviewSection(items){
      const body=items.length?'<div class="result-review-list' + (items.length === 1 ? ' result-review-single' : '') + '">'+items.map(makeWrongReviewItem).join("")+'</div>':'<p class="result-review-empty">복습할 오답 문항이 없습니다.</p>';
      return '<section class="result-review-section result-review-primary"><div class="result-review-section-head"><h3 class="result-review-title">틀린 문항</h3><span class="result-review-count">'+items.length+'문항</span></div>'+body+'</section>';
    }

    function renderResultNav(){
      const grid=document.getElementById("quick-nav-grid-result");
      const title=document.querySelector(".result-grid-title");
      if(!grid)return;
      renderResultSummary();
      if(title)title.textContent="오답 중심 복습";
      const stats=analyzeExamResultAnswers();
      grid.className="result-review-board result-review-compact";
      grid.innerHTML=renderWrongReviewSection(stats.wrong);
      bindResultReviewTooltips();
      requestAnimationFrame(fitResultGrid);
    }

    function fitResultGrid(){
      const grid=document.getElementById("quick-nav-grid-result");
      if(!grid)return;
      const cells=grid.querySelectorAll(".nav-btn:not(.placeholder)");
      cells.forEach(function(cell){
        const detail=cell.querySelector(".detail");
        if(!detail)return;
        detail.style.fontSize="";
        let size=parseFloat(getComputedStyle(detail).fontSize);
        while((detail.scrollWidth>cell.clientWidth-4||detail.scrollHeight>cell.clientHeight/2)&&size>8){
          size-=0.5;
          detail.style.fontSize=size+"px";
        }
      });
    }


    const resultGridContainer=document.getElementById("quick-nav-container-result");
    if(window.ResizeObserver&&resultGridContainer){
      const resultGridObserver=new ResizeObserver(()=>fitResultGrid());
      resultGridObserver.observe(resultGridContainer);
    }
    let quizAutoFitFrame=0;
    function scheduleQuizAutoFit(){
      if(quizAutoFitFrame)cancelAnimationFrame(quizAutoFitFrame);
      quizAutoFitFrame=requestAnimationFrame(()=>{
        fitQuestionText();
        fitOptionsText();
        scheduleQuizContentScrollState();
        requestAnimationFrame(autoResizeNavGrid);
      });
    }
    if(window.ResizeObserver){
      const quizLayoutObserver=new ResizeObserver(()=>scheduleQuizAutoFit());
      ["quiz-page","quiz-container","quiz-content","options","quick-nav-container"].forEach(id=>{
        const el=document.getElementById(id);
        if(el)quizLayoutObserver.observe(el);
      });
    }
    if(window.visualViewport){
      window.visualViewport.addEventListener("resize",()=>{
        updateQuizViewportHeight();
        initQuickNavBottomBar();
        fitResultGrid();
        scheduleQuizAutoFit();
      });
    }
    window.addEventListener("orientationchange",()=>setTimeout(()=>{
      updateQuizViewportHeight();
      initQuickNavBottomBar();
      fitResultGrid();
      scheduleQuizAutoFit();
    },120));

    (function(){
      const params=new URLSearchParams(window.location.search);
      const uid=params.get('uid')||'';
      const name=params.get('name')||'';
      userIdInput.value=uid;
      userNameInput.value=name;
      if(uid&&name){startQuiz(uid,name);}
    })();

    startQuizBtn.addEventListener("click",()=>{
      const uid=userIdInput.value.trim(),name=userNameInput.value.trim();
      if(!uid||!name){alert("아이디와 이름을 입력해주세요.");return;}
      openQuizLaunchWindow(uid,name);
    });
    nextBtn.addEventListener("click",()=>{
      if(currentQuestionIndex===TOTAL_QUESTIONS-1)submitQuiz();
      else{updateQuestion(currentQuestionIndex+1);saveQuizProgress();}
    });
    prevBtn.addEventListener("click",()=>{
      if(currentQuestionIndex>0){updateQuestion(currentQuestionIndex-1);saveQuizProgress();}
    });
    quickNavGrid.addEventListener("click",e=>{
      const btn=e.target.closest(".nav-btn");
      if(btn&&btn.dataset.q){updateQuestion(parseInt(btn.dataset.q,10));saveQuizProgress();closeQuickNavPanel();}
    });
    if(navPrevBtn)navPrevBtn.addEventListener("click",e=>{
      e.preventDefault();e.stopPropagation();
      if(currentNavPage>0){currentNavPage--;updateNavDisplay();autoResizeNavGrid();}
    });
    if(navNextBtn)navNextBtn.addEventListener("click",e=>{
      e.preventDefault();e.stopPropagation();
      const totalPages=Math.max(1,Math.ceil(TOTAL_QUESTIONS/getNavPageSize()));
      if(currentNavPage<totalPages-1){currentNavPage++;updateNavDisplay();autoResizeNavGrid();}
    });
    optionsDiv.addEventListener("change",e=>{
      requestAnimationFrame(fitOptionsText);
      scheduleQuizContentScrollState();
      const ans=parseInt(e.target.value);userAnswers[currentQuestionIndex]=ans;saveQuizProgress();
      updateNavDisplay();
    });
    document.getElementById("result-return-btn").addEventListener("click",resetQuiz);
    document.getElementById("result-complete-btn").addEventListener("click",completeLearning);

    function autoResizeNavGrid(){
      const wrap=document.getElementById("quick-nav-grid-wrap");
      const grid=document.getElementById("quick-nav-grid");
      if(!wrap||!grid)return;

      const vv=window.visualViewport;
      const vw=(vv&&vv.width)||window.innerWidth||390;
      const vh=(vv&&vv.height)||window.innerHeight||844;

      const tabletLandscape=isTabletLandscapeLayout();
      const portraitBottomNav=!tabletLandscape&&window.matchMedia("(orientation: portrait)").matches;
      const phonePortrait=portraitBottomNav&&vw<=700;
      const visibleButtons=quickNavGrid.querySelectorAll(".nav-btn:not(.placeholder)").length||Math.min(getNavPageSize(),TOTAL_QUESTIONS);
      let cols=tabletLandscape?20:10;
      if(portraitBottomNav)cols=phonePortrait?5:6;
      const rows=Math.max(1,Math.ceil(visibleButtons/cols));
      const gap=tabletLandscape?5:(portraitBottomNav?(phonePortrait?5:6):(vw<=700?5:6));

      grid.style.setProperty("grid-template-columns",`repeat(${cols}, minmax(0, 1fr))`,"important");
      grid.style.setProperty("gap",gap+"px","important");

      const wrapStyles=getComputedStyle(wrap);
      const padX=(parseFloat(wrapStyles.paddingLeft)||0)+(parseFloat(wrapStyles.paddingRight)||0);
      const padY=(parseFloat(wrapStyles.paddingTop)||0)+(parseFloat(wrapStyles.paddingBottom)||0);

      const wrapWidth=Math.max(phonePortrait?320:280,wrap.clientWidth||(vw-(vw<=700?8:16)));
      const usableWidth=Math.max(220,wrapWidth-padX);
      const widthBtnH=Math.floor((usableWidth-gap*(cols-1))/cols);

      const nav=document.getElementById("navigation-buttons");
      const navH=nav?Math.ceil(nav.getBoundingClientRect().height):64;
      const bottomReserve=tabletLandscape?0:Math.max(74,navH+12);
      const topReserve=tabletLandscape?0:(vw<=700?10:16);
      const wrapMaxH=tabletLandscape?Math.max(96,wrap.clientHeight||160):Math.max(190,vh-bottomReserve-topReserve);
      const usableHeight=Math.max(140,wrapMaxH-padY);
      const heightBtnH=Math.floor((usableHeight-gap*(rows-1))/rows);

      let btnH=Math.min(widthBtnH,heightBtnH);
      if(tabletLandscape) btnH=Math.max(24,Math.min(btnH,34));
      else if(portraitBottomNav) btnH=Math.max(phonePortrait?30:32,Math.min(btnH,phonePortrait?36:40));
      else btnH=Math.max(vw<=700?26:24,Math.min(btnH,vw<=700?36:38));

      const gridHeight=rows*btnH+(rows-1)*gap;
      const wrapHeight=gridHeight+padY+4;

      document.documentElement.style.setProperty("--nav-btn-height",btnH+"px");
      document.documentElement.style.setProperty("--quick-nav-btn-height",btnH+"px");
      grid.style.setProperty("height",gridHeight+"px","important");
      wrap.style.setProperty("height",wrapHeight+"px","important");
      wrap.style.setProperty("max-height",wrapHeight+"px","important");
      wrap.style.setProperty("overflow-y","hidden","important");
    }

    window.addEventListener("resize",()=>{
      updateQuizViewportHeight();
      initQuickNavBottomBar();
      applyResponsiveLayout();
      scheduleQuizAutoFit();
      fitResultGrid();
    });

    document.addEventListener("dragstart",e=>e.preventDefault());
    document.addEventListener("selectstart",e=>e.preventDefault());
    document.addEventListener("contextmenu",e=>e.preventDefault());
    document.addEventListener("mousedown",e=>{
      if(e.target.tagName!=="INPUT"&&e.target.tagName!=="TEXTAREA"&&e.target.tagName!=="BUTTON"){e.preventDefault();}
    });
  </script>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>청각장애인 요양보호사 자격시험 대비: 9회 모의고사</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
    if(new URLSearchParams(location.search).get('uid')){
      document.write('<style>#start-page{display:none!important}</style>');
    }
  </script>
  <style>
    :root {
      --primary: #005D7A;
      --primary-light: #0E8FB2;
      --primary-hover: #004B63;
      --primary-subtle: #D8F0F8;
      --success: #0F8A4C;
      --success-subtle: #EAF8F1;
      --danger: #C13C36;
      --danger-subtle: #FCEEEE;
      --text-primary: #162230;
      --text-secondary: #4A5D71;
      --text-muted: #71839A;
      --border: #C6D3DE;
      --surface: #F8FBFD;
      --surface-2: #FFFFFF;
      --bg: #E8EEF4;
      --shadow-soft: 0 12px 28px rgba(22, 34, 48, 0.08);
      --shadow-card: 0 8px 20px rgba(22, 34, 48, 0.07);
      --radius-lg: 18px;
      --radius-md: 12px;
      --radius-sm: 9px;
      --vw-ratio: 1;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-user-select: none;
    }
    input { user-select: text; -webkit-user-select: text; }
    img, iframe, a { -webkit-user-drag: none; pointer-events: auto; }

    html, body {
      overflow: hidden !important;
      height: 100% !important;
    }

    body {
      font-family: 'Noto Sans KR', -apple-system, sans-serif;
      color: var(--text-primary);
      min-height: 100vh;
      background:
        radial-gradient(circle at 12% 14%, rgba(46, 131, 167, 0.20) 0%, transparent 36%),
        radial-gradient(circle at 88% 84%, rgba(0, 93, 122, 0.14) 0%, transparent 40%),
        linear-gradient(160deg, #E9EEF4 0%, #D8E2EC 100%);
    }

    #start-page {
      display: none;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: clamp(16px, 3vw, 34px);
    }
    .start-wrapper {
      width: 100%;
      max-width: min(1180px, 94vw);
      position: relative;
    }
    .start-wrapper::before {
      content: '';
      display: block;
      padding-top: 55%;
    }
    .start-inner {
      position: absolute;
      inset: 0;
      border-radius: 24px;
      overflow: hidden;
      background:
        linear-gradient(140deg, #063F57 0%, #005D7A 46%, #0E8FB2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 24px 56px rgba(10, 36, 53, 0.30);
      border: 1px solid rgba(255, 255, 255, 0.20);
    }
    .start-inner::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 18% 18%, rgba(255, 255, 255, 0.16) 0%, transparent 34%),
        radial-gradient(circle at 80% 74%, rgba(255, 255, 255, 0.12) 0%, transparent 36%);
      pointer-events: none;
    }
    .start-card {
      position: relative;
      z-index: 1;
      width: clamp(330px, 40vw, 520px);
      text-align: center;
      padding: clamp(28px, 4vw, 52px) clamp(24px, 4.5vw, 56px);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.13);
      border: 1px solid rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 24px 58px rgba(4, 24, 39, 0.34);
    }
    .start-badge {
      display: inline-block;
      padding: 6px 16px;
      margin-bottom: 20px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.34);
      color: #F4FBFF;
      font-size: clamp(10px, 0.9vw, 12px);
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    #start-page h2 {
      font-size: clamp(20px, 2.3vw, 30px);
      font-weight: 700;
      color: #FFFFFF;
      line-height: 1.45;
      letter-spacing: -0.4px;
      margin-bottom: 8px;
    }
    .start-subtitle {
      font-size: clamp(12px, 1.1vw, 15px);
      font-weight: 400;
      color: rgba(237, 250, 255, 0.74);
      margin-bottom: 34px;
    }
    .input-group { margin-bottom: 13px; }
    .input-group input {
      width: 100%;
      padding: 15px 18px;
      font-size: clamp(13px, 1.05vw, 15px);
      font-family: inherit;
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.96);
      border: 2px solid transparent;
      border-radius: 12px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-group input::placeholder { color: var(--text-muted); }
    .input-group input:focus {
      border-color: rgba(255, 255, 255, 0.86);
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.20);
    }
    #start-quiz-btn {
      width: 100%;
      margin-top: 8px;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: #FFFFFF;
      color: var(--primary);
      font-family: inherit;
      font-size: clamp(13px, 1.15vw, 16px);
      font-weight: 700;
      letter-spacing: -0.2px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
      box-shadow: 0 8px 20px rgba(2, 32, 48, 0.20);
    }
    #start-quiz-btn:hover {
      background: #F3FBFF;
      transform: translateY(-2px);
      box-shadow: 0 12px 26px rgba(2, 32, 48, 0.24);
    }

    #quiz-page {
      display: none;
      grid-template-rows: 1fr auto;
      height: 100vh;
      padding: clamp(12px, 1.8vh, 22px) clamp(14px, 2vw, 26px);
      gap: clamp(8px, 1.1vh, 12px);
      overflow: hidden;
    }
    .quiz-top {
      display: grid;
      grid-template-columns: minmax(0, 1.55fr) minmax(0, 1fr);
      gap: clamp(8px, 0.8vw, 12px);
      min-height: 0;
      align-items: stretch;
    }
    #video-container {
      min-height: 0;
      border-radius: var(--radius-lg);
      background: #000000;
      box-shadow: var(--shadow-soft);
      overflow: hidden;
      border: 1px solid #D6E0E9;
      display: flex;
      flex-direction: column;
    }
    .video-wrapper {
      width: 100%;
      flex: 1 1 auto;
      min-height: 0;
      position: relative;
      background: #000000;
    }
    .video-wrapper > div {
      position: absolute !important;
      inset: 0 !important;
      padding: 0 !important;
      background: #000000;
    }
    .video-wrapper iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: #000000;
    }

    #quiz-container {
      min-height: 0;
      background: rgba(255, 255, 255, 0.92);
      border-radius: var(--radius-lg);
      border: 1px solid #D8E2EB;
      box-shadow: var(--shadow-card);
      padding: clamp(12px, 1.5vh, 18px) clamp(12px, 1.5vw, 18px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    #quiz-content {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      padding-right: 4px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
      display: flex;
      flex-direction: column;
    }
    .question-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: clamp(10px, 1.3vh, 14px);
    }
    .q-num-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 14px;
      border-radius: 999px;
      background: linear-gradient(120deg, var(--primary) 0%, #0E8FB2 100%);
      color: #FFFFFF;
      font-size: clamp(11px, 0.9vw, 13px);
      font-weight: 700;
      letter-spacing: 0.1px;
    }
    #quiz-content h3 {
      font-size: clamp(15px, 1.55vw, 21px);
      font-weight: 700;
      line-height: 1.64;
      color: var(--text-primary);
      margin-bottom: clamp(10px, 1.2vh, 14px);
      padding: clamp(12px, 1.4vh, 16px);
      background: #EDF7FC;
      border: 1px solid #CAE8F4;
      border-left: 5px solid var(--primary-light);
      border-radius: 11px;
    }

    #options {
      display: flex;
      flex-direction: column;
      gap: clamp(6px, 0.7vh, 10px);
      flex: 1 1 auto;
    }
    #options label {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: clamp(10px, 1.1vh, 13px) clamp(12px, 1.2vw, 16px);
      background: #FFFFFF;
      border: 1.5px solid #CDD8E2;
      border-radius: 10px;
      cursor: pointer;
      font-size: clamp(16px, 1.65vw, 23px);
      font-weight: 500;
      line-height: 1.5;
      color: var(--text-primary);
      transition: border-color 0.15s, transform 0.15s, background 0.15s;
      word-break: keep-all;
      white-space: normal;
    }
    #options label:hover {
      background: #F2FAFE;
      border-color: #9ED5E8;
      transform: translateX(2px);
    }
    #options input[type="radio"] {
      width: 17px;
      height: 17px;
      flex-shrink: 0;
      accent-color: var(--primary);
    }
    #options label:has(input:checked) {
      background: linear-gradient(135deg, #0A6A87 0%, #0E8FB2 100%);
      border-color: #0A6A87;
      color: #FFFFFF;
      box-shadow: 0 8px 18px rgba(8, 97, 126, 0.24);
    }
    #options label:has(input:checked) span {
      color: #FFFFFF;
      font-weight: 600;
    }

    #navigation-buttons {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: clamp(12px, 1.6vh, 18px);
      padding-top: clamp(12px, 1.6vh, 16px);
      border-top: 1px solid #D3DEE7;
    }
    #navigation-buttons button {
      min-width: 96px;
      padding: clamp(8px, 1vh, 11px) clamp(14px, 1.4vw, 20px);
      border-radius: 10px;
      font-family: inherit;
      font-size: clamp(12px, 1vw, 14px);
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
    }
    #prev-btn {
      border: 1.5px solid #C7D4DE;
      background: #FFFFFF;
      color: var(--text-secondary);
    }
    #prev-btn:hover:not(:disabled) {
      background: #F0F7FB;
      color: var(--text-primary);
      transform: translateY(-1px);
      box-shadow: 0 5px 12px rgba(34, 66, 94, 0.10);
    }
    #prev-btn:disabled { opacity: 0.38; cursor: not-allowed; }
    #next-btn {
      border: none;
      background: linear-gradient(120deg, var(--primary) 0%, #0E8FB2 100%);
      color: #FFFFFF;
      box-shadow: 0 6px 14px rgba(0, 93, 122, 0.28);
    }
    #next-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 18px rgba(0, 93, 122, 0.30);
    }
    #next-btn.submit-mode {
      background: linear-gradient(120deg, #AF342F 0%, #D4574B 100%);
      box-shadow: 0 6px 14px rgba(175, 52, 47, 0.26);
    }
    #next-btn.submit-mode:hover {
      box-shadow: 0 10px 18px rgba(175, 52, 47, 0.30);
    }

    #question-counter {
      font-size: clamp(12px, 1.05vw, 14px);
      font-weight: 700;
      color: var(--text-secondary);
    }
    #total-questions { color: var(--primary); }

    #quick-nav-container {
      display: none;
      flex-direction: column;
      justify-content: center;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid #D3DDE6;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      padding: clamp(10px, 1.4vh, 15px) clamp(12px, 1.5vw, 20px);
      overflow: hidden;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .nav-header {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: clamp(6px, 0.8vh, 10px);
    }
    .nav-section-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 17px;
      border-radius: 999px;
      background: linear-gradient(120deg, var(--primary) 0%, #0E8FB2 100%);
      color: #FFFFFF;
      font-size: clamp(12px, 1vw, 14px);
      font-weight: 700;
      letter-spacing: 0.3px;
      text-align: center;
    }
    #quick-nav-grid-wrap { overflow: visible; padding-bottom: 2px; }
    #quick-nav-grid {
      display: grid;
      grid-template-columns: repeat(10, minmax(0, 1fr));
      gap: clamp(3px, 0.35vw, 5px);
    }

    .nav-btn {
      height: var(--nav-btn-height, 28px);
      line-height: var(--nav-btn-height, 28px);
      padding: 0;
      border-radius: 7px;
      border: 1px solid #C5D1DB;
      background: #FFFFFF;
      color: var(--text-secondary);
      font-family: inherit;
      font-size: clamp(10px, 0.85vw, 13px);
      font-weight: 700;
      text-align: center;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s, color 0.12s, transform 0.12s;
      overflow: hidden;
      white-space: nowrap;
      user-select: none;
      -webkit-user-select: none;
    }
    .nav-btn:hover {
      background: #E9F7FD;
      border-color: #97D4E8;
      color: var(--primary);
      transform: translateY(-1px);
    }
    .nav-btn.active {
      background: linear-gradient(120deg, var(--primary) 0%, #0E8FB2 100%);
      color: #FFFFFF;
      border-color: #0B7FA1;
    }
    .nav-btn.answered {
      background: var(--success-subtle);
      color: var(--success);
      border-color: #83D5A8;
    }
    .nav-btn.correct {
      background: var(--success-subtle) !important;
      color: var(--success) !important;
      border-color: #83D5A8 !important;
    }
    .nav-btn.incorrect {
      background: var(--danger-subtle) !important;
      color: var(--danger) !important;
      border-color: #F0B1AC !important;
    }

    #result-page {
      display: none;
      flex-direction: column;
      align-items: center;
      position: fixed;
      inset: 0;
      padding: clamp(10px, 1.5vh, 18px) clamp(10px, 2vw, 24px);
      background:
        radial-gradient(circle at 12% 16%, rgba(42, 142, 181, 0.16) 0%, transparent 34%),
        radial-gradient(circle at 86% 78%, rgba(0, 93, 122, 0.12) 0%, transparent 40%),
        linear-gradient(180deg, #EEF4FA 0%, #E4ECF4 100%);
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      gap: clamp(8px, 1.2vh, 12px);
    }
    #result-page > .result-heading,
    #result-page > #score,
    #result-page > #quick-nav-container-result,
    #result-page > #result-return-btn {
      width: min(100%, 1120px);
    }
    .result-heading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: nowrap;
      white-space: nowrap;
      margin: 0;
    }
    .result-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 5px 16px;
      border-radius: 999px;
      background: #2E57D7;
      color: #FFFFFF;
      font-size: clamp(11px, 0.95vw, 13px);
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }
    .result-heading h2 {
      text-align: center;
      font-size: clamp(18px, 1.9vw, 28px);
      color: var(--text-primary);
      font-weight: 800;
      letter-spacing: -0.5px;
      margin: 0;
    }
    .result-user-name {
      margin: 0;
      color: #64748B;
      font-size: clamp(12px, 1vw, 15px);
      font-weight: 600;
      line-height: 1.2;
      flex-shrink: 0;
    }
    @media (max-width: 860px) {
      .result-heading {
        flex-wrap: wrap;
        white-space: normal;
        gap: 6px;
      }
      .result-user-name {
        width: 100%;
        text-align: center;
      }
    }
    #score {
      text-align: center;
      margin: 0;
      font-size: clamp(13px, 1.3vw, 17px);
      font-weight: 700;
      color: var(--primary);
      background: rgba(255, 255, 255, 0.90);
      border: 1.5px solid #BEE5F3;
      border-radius: 14px;
      padding: clamp(8px, 1.2vh, 12px) clamp(14px, 2vw, 28px);
      box-shadow: var(--shadow-card);
      word-break: keep-all;
    }

    #result-shell {
      width: min(100%, 1120px);
      display: flex;
      flex-direction: column;
      gap: clamp(8px, 1.2vh, 12px);
      margin: 0 auto;
    }
    .result-summary-card {
      position: sticky;
      top: 0;
      z-index: 3;
      text-align: center;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid #CFDDE8;
      border-radius: 16px;
      box-shadow: var(--shadow-card);
      padding: clamp(10px, 1.4vh, 14px) clamp(14px, 2vw, 24px);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .result-summary-card .result-heading,
    .result-summary-card #score {
      width: 100%;
    }

    #quick-nav-container-result {
      width: min(100%, 1120px);
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid #CFDDE8;
      border-radius: 16px;
      box-shadow: var(--shadow-card);
      padding: clamp(10px, 1.4vh, 14px) clamp(10px, 1.6vw, 16px);
      overflow-x: hidden;
    }
    .result-grid-title {
      text-align: center;
      margin-bottom: 10px;
      font-size: clamp(11px, 1vw, 13px);
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    #quick-nav-grid-result {
      display: grid;
      grid-template-columns: repeat(10, minmax(0, 1fr));
      gap: clamp(4px, 0.45vw, 7px);
      width: 100%;
      margin-bottom: 0;
    }
    #quick-nav-grid-result .nav-btn {
      height: auto;
      min-height: 58px;
      line-height: 1.1;
      padding: clamp(6px, 0.9vh, 9px) clamp(3px, 0.45vw, 6px);
      border-radius: 9px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      min-width: 0;
      overflow: hidden;
      cursor: default;
      transform: none;
    }
    #quick-nav-grid-result .nav-btn:hover { transform: none; }
    #quick-nav-grid-result,
    #quick-nav-grid-result .nav-btn {
      min-width: 0;
      max-width: 100%;
      box-sizing: border-box;
    }
    #quick-nav-grid-result .nav-btn .number {
      font-size: clamp(11px, 1.2vw, 15px);
      font-weight: 800;
      line-height: 1;
    }
    #quick-nav-grid-result .nav-btn .detail {
      font-size: clamp(8.5px, 0.85vw, 10px);
      line-height: 1.2;
      opacity: 0.92;
      white-space: nowrap;
      text-overflow: ellipsis;
      overflow: hidden;
      max-width: 100%;
      display: block;
    }
    #quick-nav-grid-result .nav-btn .detail-c,
    #quick-nav-grid-result .nav-btn .detail-m {
      display: block;
      line-height: 1.1;
      white-space: nowrap;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #quick-nav-grid-result .nav-btn .detail-c { font-weight: 700; }
    #quick-nav-grid-result .nav-btn .detail-m { font-weight: 600; opacity: 0.9; }
    #quick-nav-grid-result.compact .nav-btn {
      min-height: 62px;
      padding: 9px 5px;
      gap: 2px;
    }

    #result-return-btn {
      width: min(100%, 420px);
      margin: 2px auto 0;
      padding: 12px 18px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(120deg, var(--primary) 0%, #0E8FB2 100%);
      color: #FFFFFF;
      font-family: inherit;
      font-size: clamp(14px, 1.35vw, 16px);
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0, 93, 122, 0.28);
      transition: transform 0.2s, box-shadow 0.2s;
      position: sticky;
      bottom: max(6px, env(safe-area-inset-bottom));
      z-index: 2;
    }
    #result-return-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(0, 93, 122, 0.31);
    }

    @media (max-width: 1180px) {
      .quiz-top { grid-template-columns: minmax(0, 1.28fr) minmax(0, 1fr); }
      #quick-nav-grid-result { grid-template-columns: repeat(8, minmax(0, 1fr)); }
    }

    @media (max-width: 980px) {
      #quiz-page {
        padding: 10px 10px 12px;
        gap: 8px;
      }
      .quiz-top {
        grid-template-columns: 1fr;
        gap: 8px;
      }
      #video-container {
        min-height: 40vh;
      }
      #quick-nav-grid-result { grid-template-columns: repeat(6, minmax(0, 1fr)); }
      #quick-nav-grid-result .nav-btn .detail {
        font-size: clamp(9px, 1.3vw, 11px);
      }
    }

    @media (max-width: 700px) {
      #start-page { padding: 10px; }
      .start-wrapper::before { padding-top: 70%; }
      .start-card {
        width: min(94vw, 430px);

    function fitQuestionText(){
      const h3 = document.querySelector("#quiz-content h3");
      const container = document.getElementById("quiz-container");
      if(!h3 || !container) return;
      const maxSize = Math.min(20, Math.max(12, container.clientWidth * 0.022));
      let size = maxSize;
      h3.style.fontSize = size + "px";
      const maxH = size * 1.7 * 2;
      while(h3.scrollHeight > maxH + 2 && size > 12){
        size -= 0.5;
        h3.style.fontSize = size + "px";
      }
    }

    function fitOptionsText(){
      const quizContent = document.getElementById("quiz-content");
      const optionsWrap = document.getElementById("options");
      const labels = document.querySelectorAll("#options label");
      if(!quizContent || !labels.length) return;

      // 1단계: 기본 크기/패딩으로 초기화
      labels.forEach(l => { l.style.fontSize = ""; l.style.paddingTop = ""; l.style.paddingBottom = ""; });
      optionsWrap.style.gap = "";
      const defaultSize = parseFloat(getComputedStyle(labels[0]).fontSize);

      // 2단계: 두 줄인 선택지만 개별로 최대 8% 이내 조금 축소
      labels.forEach(label => {
        label.style.whiteSpace = "nowrap";
        const oneLineH = label.scrollHeight;
        label.style.whiteSpace = "";
        if(label.scrollHeight > oneLineH * 1.3){
          const minSize = defaultSize * 0.92;
          let size = defaultSize;
          while(label.scrollHeight > oneLineH * 1.3 && size > minSize){
            size -= 0.2;
            label.style.fontSize = size + "px";
          }
        }
      });

      // 3단계: 전체가 넘치면 → 상하 패딩만 줄이기 (간격/좌우패딩 유지)
      if(quizContent.scrollHeight > quizContent.clientHeight + 2){
        let pad = parseFloat(getComputedStyle(labels[0]).paddingTop) || 9;
        while(quizContent.scrollHeight > quizContent.clientHeight + 2 && pad > 4){
          pad -= 0.5;
          labels.forEach(l => { l.style.paddingTop = pad + "px"; l.style.paddingBottom = pad + "px"; });
        }
      }

      // 4단계: 그래도 넘치면 → 폰트 최소 15px까지만 축소
      if(quizContent.scrollHeight > quizContent.clientHeight + 2){

        while(quizContent.scrollHeight > quizContent.clientHeight + 2 && size > 15){

      }

      { number:"모0944", question:"약을 보관할 때 약이 변질될 가능성이 높은 상황은?", options:["알약을 원래의 약 용기에 넣어 건조한 곳에 보관한다.","시럽제는 서늘한 곳에 직사광선을 피해 보관한다.","과하게 따른 물약은 다시 병에 넣어 보관한다.","개봉한 물약은 색깔이나 냄새를 자주 확인한다.","안약이나 귀약은 상온의 그늘진 곳에서 보관한다."], correctAnswer:3, videoId:"1119285304" },

          currentQuestionIndex=data.progress.currentQuestion||0;
          userAnswers=data.progress.answers||new Array(TOTAL_QUESTIONS).fill(null);showQuizPage();
        }else{currentQuestionIndex=0;userAnswers=new Array(TOTAL_QUESTIONS).fill(null);showQuizPage();}
      });
    }

    function showQuizPage(){
      startPage.style.display="none";quizPage.style.display="grid";
      document.getElementById("quick-nav-container").style.display="flex";
      createQuickNavButtons();updateQuestion(currentQuestionIndex);
      requestAnimationFrame(()=>{
        applyResponsiveLayout();
        fitQuestionText();
        fitOptionsText();
        requestAnimationFrame(()=>{
          autoResizeNavGrid();
          requestAnimationFrame(autoResizeNavGrid);
        });
      });
    }

    function saveQuizProgress(){
      if(!currentUserId)return;
      database.ref(`exams/${EXAM_ID}/users/${currentUserId}/progress`).set({currentQuestion:currentQuestionIndex,answers:userAnswers});
    }

    function updateQuestion(index){
      currentQuestionIndex=index;
      const question=quizData[currentQuestionIndex];
      videoWrapper.innerHTML=question.videoEmbed;
      requestAnimationFrame(applyResponsiveLayout);
      questionNumberSpan.textContent=currentQuestionIndex+1;
      questionTextSpan.textContent=question.question;
      currentQuestionSpan.textContent=currentQuestionIndex+1;
      totalQuestionsSpan.textContent=TOTAL_QUESTIONS;
      requestAnimationFrame(fitQuestionText);
      requestAnimationFrame(fitOptionsText);
      optionsDiv.innerHTML="";
      question.options.forEach((option,i)=>{
        const label=document.createElement("label");
        label.innerHTML=`<input type="radio" name="answer" value="${i+1}"><span>${option}</span>`;
        optionsDiv.appendChild(label);
      });
      if(userAnswers[currentQuestionIndex]!==null){
        const r=optionsDiv.querySelector(`input[value="${userAnswers[currentQuestionIndex]}"]`);
        if(r)r.checked=true;
      }
      document.querySelectorAll(".nav-btn").forEach((btn,i)=>{
        btn.classList.remove("active","answered");
        const ans=userAnswers[i];
        btn.textContent=ans?`${i+1}(${ans})`:i+1;
        if(ans)btn.classList.add("answered");
      });
      const cur=document.querySelector(`.nav-btn[data-q="${currentQuestionIndex}"]`);
      if(cur)cur.classList.add("active");
      prevBtn.disabled=currentQuestionIndex===0;
      nextBtn.textContent=currentQuestionIndex===TOTAL_QUESTIONS-1?"제출하기":"다음 →";
      if(currentQuestionIndex===TOTAL_QUESTIONS-1)nextBtn.classList.add("submit-mode");
      else nextBtn.classList.remove("submit-mode");
    }

    function createQuickNavButtons(){
      quickNavGrid.innerHTML="";
      const FIXED_SIZE=80;
      for(let i=0;i<FIXED_SIZE;i++){
        const btn=document.createElement("div");
        btn.classList.add("nav-btn");
        if(i<TOTAL_QUESTIONS){
          btn.textContent=i+1;btn.dataset.q=i;
          btn.draggable=false;btn.addEventListener("mousedown",e=>e.preventDefault());
        } else {
          btn.style.opacity="0";
          btn.style.pointerEvents="none";
        }
        quickNavGrid.appendChild(btn);
      }
    }

    function disableAnswers(){
      optionsDiv.querySelectorAll("input[type=radio]").forEach(r=>r.disabled=true);
      quickNavGrid.style.pointerEvents="none";
    }

    function submitQuiz(){
      let 필기=0,실기=0;
      quizData.forEach((item,i)=>{
        if(userAnswers[i]&&userAnswers[i]==item.correctAnswer){if(i<35)필기++;else 실기++;}
      });
      const 총점=필기+실기;
      const 합격여부 = (필기 >= 21 && 실기 >= 27) ? "합격" : "불합격";
      quizPage.style.display="none";resultPage.style.display="flex";
      syncResultUserName(userNameInput.value.trim()||currentUserName);
      scoreSpan.textContent=`총점: ${총점}점 ( 필기: ${필기}점 / 실기: ${실기}점 )`;
      if(currentUserId){
        const ref=database.ref(`exams/${EXAM_ID}/users/${currentUserId}`);
        ref.child("result").set({total:총점,필기,실기,answers:userAnswers});
        ref.child("progress").remove();
      }
      renderResultNav();disableAnswers();alert("제출 완료하였습니다!");
      const googleFormURL="https://docs.google.com/forms/d/e/1FAIpQLSfmdzft5Xpy3UPoRQ0-e9iN1JAnG_NnAdXmMZwKz04inJDqzQ/formResponse";
      const fd=new FormData();
      fd.append("entry.295783163",userNameInput.value.trim());
      fd.append("entry.516479247",`${총점}점 ( 필기: ${필기}점 / 실기: ${실기}점 )`);
      fd.append("entry.516661777", 합격여부);
      fetch(googleFormURL,{method:"POST",body:fd,mode:"no-cors", keepalive: true }).catch(console.error);
      const resultData={type:"examResult",total:총점,필기:필기,실기:실기,answers:userAnswers,correctAnswers:quizData.map(q=>q.correctAnswer),name:userNameInput.value.trim(),uid:currentUserId};
      try{if(window.opener&&!window.opener.closed){window.opener.postMessage(resultData,"*");}}catch(e){console.error(e);}
      try{window.close();}catch(e){}
    }

    function resetQuiz(){
      if(!currentUserId){location.reload();return;}
      alert("초기화되었습니다!");
      const ref=database.ref(`exams/${EXAM_ID}/users/${currentUserId}`);
      ref.child("progress").remove().then(()=>ref.child("result").remove()).then(()=>{
        resultPage.style.display="none";currentQuestionIndex=0;
        userAnswers=new Array(TOTAL_QUESTIONS).fill(null);showQuizPage();
        quickNavGrid.style.pointerEvents="auto";
      });
    }

    function normalizeResultAnswers(answers){
      const arr=new Array(TOTAL_QUESTIONS).fill(null);
      if(Array.isArray(answers)){
        for(let i=0;i<TOTAL_QUESTIONS;i++)arr[i]=answers[i]??null;
      }else if(answers&&typeof answers==="object"){
        Object.keys(answers).forEach(function(k){
          const idx=parseInt(k,10);
          if(idx>=0&&idx<TOTAL_QUESTIONS)arr[idx]=answers[k];
        });
      }
      return arr;
    }


    function makeResultChip(item,type){
      const no=String(item.no).padStart(2,"0")+"번";
      return `<span class="result-chip ${type}"><span class="chip-no">${no}</span><span class="chip-meta">C:${item.correct} / M:${item.mine}</span></span>`;
    }

    function renderResultNav(){
      const grid=document.getElementById("quick-nav-grid-result");
      const title=document.querySelector(".result-grid-title");
      if(!grid)return;
      if(title)title.textContent="학습 요약";
      userAnswers=normalizeResultAnswers(userAnswers);

      let correct=0;
      const solved=[];
      const wrong=[];
      const empty=[];
      quizData.forEach(function(q,i){
        const raw=userAnswers[i];
        const mine=(raw===null||raw===undefined||raw==="")?"-":raw;
        const ok=mine!=="-"&&parseInt(mine,10)===parseInt(q.correctAnswer,10);
        if(ok){
          correct++;
          solved.push({no:i+1,correct:q.correctAnswer,mine:mine});
        }
        else if(mine==="-")empty.push({no:i+1,correct:q.correctAnswer,mine:mine});
        else wrong.push({no:i+1,correct:q.correctAnswer,mine:mine});
      });

      const wrongHtml=wrong.length?wrong.map(function(item){return makeResultChip(item,"wrong");}).join(""):'<p class="result-empty-note">오답 문항이 없습니다.</p>';
      const emptyHtml=empty.length?empty.map(function(item){return makeResultChip(item,"empty");}).join(""):'<p class="result-empty-note">미응답 문항이 없습니다.</p>';
      const solvedHtml=solved.length?solved.map(function(item){return makeResultChip(item,"correct");}).join(""):'<p class="result-empty-note">정답 문항이 없습니다.</p>';

      grid.innerHTML=`
        <div class="result-insight-grid">
          <div class="result-mini-card correct"><span class="result-mini-label">정답</span><span class="result-mini-value">${correct}</span></div>
          <div class="result-mini-card wrong"><span class="result-mini-label">오답</span><span class="result-mini-value">${wrong.length}</span></div>
          <div class="result-mini-card empty"><span class="result-mini-label">미응답</span><span class="result-mini-value">${empty.length}</span></div>
        </div>
        <section class="result-section-list">
          <h3 class="result-section-title">틀린 문항</h3>
          <div class="result-chip-wrap">${wrongHtml}</div>
        </section>
        <section class="result-section-list">
          <h3 class="result-section-title">미응답 문항</h3>
          <div class="result-chip-wrap">${emptyHtml}</div>
        </section>
        <section class="result-section-list">
          <h3 class="result-section-title">정답 문항</h3>
          <div class="result-chip-wrap">${solvedHtml}</div>
        </section>`;
    }

    function fitResultGrid(){}
    (function(){
      const params=new URLSearchParams(window.location.search);
      const uid=params.get('uid')||'';
      const name=params.get('name')||'';
      userIdInput.value=uid;
      userNameInput.value=name;
      if(uid&&name){startQuiz(uid,name);}
    })();

    startQuizBtn.addEventListener("click",()=>{
      const uid=userIdInput.value.trim(),name=userNameInput.value.trim();
      if(!uid||!name){alert("아이디와 이름을 입력해주세요.");return;}
      startQuiz(uid,name);
    });
    nextBtn.addEventListener("click",()=>{
      if(currentQuestionIndex===TOTAL_QUESTIONS-1)submitQuiz();
      else{updateQuestion(currentQuestionIndex+1);saveQuizProgress();}
    });
    prevBtn.addEventListener("click",()=>{
      if(currentQuestionIndex>0){updateQuestion(currentQuestionIndex-1);saveQuizProgress();}
    });
    quickNavGrid.addEventListener("click",e=>{
      if(e.target.classList.contains("nav-btn")){updateQuestion(parseInt(e.target.dataset.q));saveQuizProgress();}
    });
    optionsDiv.addEventListener("change",e=>{
      requestAnimationFrame(fitOptionsText);
      const ans=parseInt(e.target.value);userAnswers[currentQuestionIndex]=ans;saveQuizProgress();
      const btn=document.querySelector(`.nav-btn[data-q="${currentQuestionIndex}"]`);
      if(btn){btn.textContent=`${currentQuestionIndex+1}(${ans})`;btn.classList.add("answered");}
    });
    document.getElementById("result-return-btn").addEventListener("click",resetQuiz);

    function autoResizeNavGrid(){
      const navCont=document.getElementById("quick-nav-container");
      const grid=document.getElementById("quick-nav-grid");
      if(!navCont||!grid)return;
      const navH=navCont.clientHeight;
      const cs=getComputedStyle(navCont);
      const padV=parseFloat(cs.paddingTop)+parseFloat(cs.paddingBottom);
      const headerH=(document.querySelector(".nav-header")||{}).offsetHeight||0;
      const gridGap=parseFloat(getComputedStyle(grid).gap)||5;
      const rowGaps=7*gridGap;
      const gridH=navH-padV-headerH;
      const btnH=Math.max(14,Math.min(28,Math.floor((gridH-rowGaps)/8)));
      document.documentElement.style.setProperty("--nav-btn-height",btnH+"px");
      const fixedGridH=btnH*8+rowGaps+2;
      grid.style.height=fixedGridH+"px";
      const navHeader=document.querySelector(".nav-header");
      const headerMarginB=navHeader?parseFloat(getComputedStyle(navHeader).marginBottom)||0:0;
      const fixedNavH=fixedGridH+padV+headerH+headerMarginB;
      const quizPage=document.getElementById("quiz-page");
      if(quizPage) quizPage.style.gridTemplateRows="1fr "+fixedNavH+"px";
    }


    if(window.ResizeObserver){
      const resultContainer=document.getElementById("quick-nav-container-result");
      if(resultContainer)new ResizeObserver(()=>fitResultGrid()).observe(resultContainer);
    }

    window.addEventListener("resize",()=>{
      applyResponsiveLayout();
      fitQuestionText();
      requestAnimationFrame(autoResizeNavGrid);
      fitResultGrid();
    });

    document.addEventListener("dragstart",e=>e.preventDefault());
    document.addEventListener("selectstart",e=>e.preventDefault());
    document.addEventListener("contextmenu",e=>e.preventDefault());
    document.addEventListener("mousedown",e=>{
      if(e.target.tagName!=="INPUT"&&e.target.tagName!=="TEXTAREA"&&e.target.tagName!=="BUTTON"){e.preventDefault();}
    });
  </script>
</body>
</html>

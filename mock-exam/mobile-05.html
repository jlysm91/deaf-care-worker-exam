<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>청각장애인 요양보호사 자격시험 대비: 5회 모의고사</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1D4ED8;
      --primary-light: #3B82F6;
      --primary-hover: #1E40AF;
      --primary-subtle: #BFDBFE;
      --success: #059669;
      --success-subtle: #ECFDF5;
      --danger: #DC2626;
      --danger-subtle: #FEF2F2;
      --text-primary: #0F172A;
      --text-secondary: #475569;
      --text-muted: #94A3B8;
      --border: #B8C4CE;
      --surface: #F2F4F6;
      --surface-2: #F8FAFC;
      --bg: #A2ACB8;
    }

    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none; -webkit-user-select: none;
    }
    input { user-select: text; -webkit-user-select: text; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Noto Sans KR', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
    }

    /* ━━━━━━ 퀴즈 페이지 ━━━━━━ */
    #quiz-page {
      display: none;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    /* 상단 헤더 */
    .mobile-header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      padding-top: calc(10px + env(safe-area-inset-top, 0px));
      background: var(--primary);
      color: #fff;
      min-height: 48px;
    }
    .header-badge {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      padding: 4px 12px;
      border-radius: 50px;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-counter {
      font-size: 14px;
      font-weight: 600;
    }
    .header-counter .current { color: #fff; font-weight: 800; }
    .header-counter .sep { color: rgba(255,255,255,0.55); }
    .header-counter .total { color: rgba(255,255,255,0.75); }

    /* ━━━━━━ 콘텐츠 바디 ━━━━━━ */
    .quiz-body {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    /* 비디오 영역 */
    .video-section {
      flex-shrink: 0;
      width: 100%;
      aspect-ratio: 16 / 9;
      position: relative;
      background: var(--bg);
    }
    .video-section iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }

    /* 스크롤 가능한 문제+보기 영역 */
    .quiz-scroll {
      flex: 1 1 auto;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 12px 14px 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: var(--bg);
    }
    .quiz-scroll::-webkit-scrollbar { display: none; }

    /* 문제 지문 */
    .question-box {
      background: var(--primary-subtle);
      border-left: 3px solid var(--primary-light);
      border-radius: 8px;
      padding: 10px 14px;
      flex-shrink: 0;
      min-height: 0;
    }
    .q-num-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .q-text-content {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.65;
      word-break: keep-all;
    }

    /* 보기 옵션 */
    .options-list {
      display: flex;
      flex-direction: column;
      gap: 7px;
      padding-bottom: 12px;
    }
    .opt-label {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
      min-height: 48px;
    }
    .opt-label:active { background: #DBEAFE; border-color: var(--primary-light); }
    .opt-label input[type="radio"] {
      flex-shrink: 0;
      margin-top: 2px;
      accent-color: var(--primary);
      width: 18px; height: 18px;
    }
    .opt-label span {
      font-size: 14px;
      font-weight: 400;
      line-height: 1.55;
      color: var(--text-primary);
      word-break: keep-all;
      flex: 1;
    }
    .opt-label:has(input:checked) {
      background: var(--primary);
      border-color: var(--primary);
    }
    .opt-label:has(input:checked) span { color: #fff; font-weight: 600; }

    /* ━━━━━━ 하단 네비게이션 ━━━━━━ */
    .bottom-nav {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
      background: var(--surface);
      border-top: 1px solid var(--border);
      box-shadow: 0 -2px 14px rgba(0,0,0,0.07);
    }
    .bottom-nav button {
      flex: 1;
      padding: 13px 8px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.12s;
    }
    #prev-btn {
      flex: 1;
      background: var(--surface-2);
      color: var(--text-secondary);
      border: 1.5px solid var(--border);
      text-align: center;
    }
    #prev-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    #nav-sheet-btn {
      flex: 1;
      background: var(--surface-2);
      color: var(--text-secondary);
      border: 1.5px solid var(--border);
      text-align: center;
      white-space: nowrap;
    }
    #next-btn {
      flex: 1;
      background: var(--primary);
      color: #fff;
      border: none;
      text-align: center;
    }
    #next-btn.submit-mode { background: var(--danger); }

    /* ━━━━━━ 문항 이동 Bottom Sheet ━━━━━━ */
    .sheet-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.5);
      z-index: 200;
      opacity: 0;
      transition: opacity 0.25s;
    }
    .sheet-overlay.active { display: block; }
    .sheet-overlay.visible { opacity: 1; }

    .bottom-sheet {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      padding: 0 14px calc(16px + env(safe-area-inset-bottom, 0px));
      z-index: 201;
      max-height: 60vh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    }
    .bottom-sheet.visible { transform: translateY(0); }
    .sheet-sticky-top {
      position: sticky;
      top: 0;
      background: var(--surface);
      padding: 14px 0 12px;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .sheet-title-block {
      flex: 1;
      text-align: center;
      min-width: 0;
    }
    .sheet-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 1.5px;
      display: inline;
    }
    .sheet-progress-inline {
      display: inline;
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 500;
      margin-left: 8px;
    }
    .sheet-progress-inline .prog-answered { color: var(--success); font-weight: 700; }
    .sheet-progress-inline .prog-unanswered { color: var(--text-muted); }
    .sheet-close-btn {
      flex-shrink: 0;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 20px;
      font-weight: 400;
      font-family: inherit;
      padding: 4px 8px;
      cursor: pointer;
      line-height: 1;
    }

    .sheet-grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 5px;
    }
    .sheet-nav-btn {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      height: 34px;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      text-align: center;
      cursor: pointer;
      line-height: 1;
      transition: all 0.1s;
    }
    .sheet-nav-btn:active { transform: scale(0.93); }
    .sheet-nav-btn.answered {
      background: var(--success-subtle);
      color: var(--success);
      border-color: #6EE7B7;
    }
    .sheet-nav-btn.active-q {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    .sheet-nav-btn .sn-num { font-size: 12px; font-weight: 700; line-height: 1; }
    .sheet-nav-btn .sn-ans { font-size: 9px; opacity: 0.85; line-height: 1; }

    /* ━━━━━━ 태블릿 반응형 (601px 이상) ━━━━━━ */
    @media (min-width: 601px) {
      .mobile-header { min-height: 56px; padding: 12px 24px; padding-top: calc(12px + env(safe-area-inset-top, 0px)); }
      .header-badge { font-size: 14px; padding: 6px 18px; }
      .header-counter { font-size: 18px; }
      .quiz-body { flex-direction: row; }
      .video-section {
        flex: 0 0 52%;
        width: 52%;
        aspect-ratio: unset;
        align-self: stretch;
        background: #000000;
        display: flex;
        align-items: center;
      }
      .video-section iframe {
        position: relative;
        width: 100%;
        height: auto;
        aspect-ratio: 16 / 9;
      }
      .quiz-scroll {
        flex: 1;
        padding: 16px 18px 0;
        gap: 10px;
        background: var(--bg);
        display: flex;
        flex-direction: column;
      }
      .quiz-scroll .question-box { flex-shrink: 0; }
      .quiz-scroll .options-list {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding-top: 0px;
        padding-bottom: 16px;
      }
      .quiz-scroll .opt-label {
        flex: 1;
      }
      .q-num-label { font-size: 13px; margin-bottom: 8px; }
      .q-text-content { font-size: 19px; }
      .question-box { padding: 16px 18px; }
      .opt-label { padding: 14px 18px; min-height: 56px; gap: 14px; }
      .opt-label span { font-size: 17px; }
      .opt-label input[type="radio"] { width: 20px; height: 20px; }
      .options-list { gap: 10px; }
      .bottom-nav { padding: 12px 24px; gap: 12px; padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px)); }
      .bottom-nav button { padding: 16px 8px; font-size: 16px; border-radius: 12px; }
      .bottom-sheet {
        left: 50%;
        right: auto;
        width: min(640px, 100vw);
        transform: translateX(-50%) translateY(100%);
        max-height: 85vh;
        overflow-y: hidden;
      }
      .bottom-sheet.visible { transform: translateX(-50%) translateY(0); }
      .sheet-nav-btn { height: 40px; }
      .sheet-nav-btn .sn-num { font-size: 14px; }
      .sheet-nav-btn .sn-ans { font-size: 11px; }
      .sheet-title { font-size: 13px; }
      .sheet-progress-inline { font-size: 13px; }
      .sheet-close-btn { font-size: 22px; }
      #result-page { padding: 32px; }
      .r-title { font-size: 28px; }
      .r-score-total { font-size: 48px; }
      .r-score-sub { font-size: 38px; }
      .r-score-label { font-size: 13px; }
      .r-grid .rn { font-size: 13px; }
      .r-grid .rm { font-size: 10px; }
      .r-retry-btn { font-size: 18px; padding: 18px; }
    }

    /* ━━━━━━ 결과 페이지 ━━━━━━ */
    #result-page {
      display: none;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      background: var(--bg);
      padding: 20px 16px;
      padding-top: calc(20px + env(safe-area-inset-top, 0px));
      padding-bottom: calc(24px + env(safe-area-inset-bottom, 0px));
      gap: 14px;
    }
    #result-page::-webkit-scrollbar { display: none; }

    .r-header { text-align: center; }
    .r-badge {
      display: inline-block;
      background: var(--primary);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      padding: 4px 14px;
      border-radius: 50px;
      margin-bottom: 8px;
    }
    .r-title {
      font-size: 22px;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 4px;
    }
    .r-name { font-size: 13px; color: var(--text-muted); font-weight: 500; }

    .r-score-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 16px 12px;
      display: flex;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .r-score-item { flex: 1; text-align: center; }
    .r-score-item + .r-score-item { border-left: 1.5px solid var(--border); }
    .r-score-label { font-size: 11px; font-weight: 700; color: var(--text-muted); letter-spacing: 1px; margin-bottom: 6px; }
    .r-score-total { font-size: 36px; font-weight: 900; color: var(--primary); line-height: 1; }
    .r-score-sub { font-size: 28px; font-weight: 900; color: var(--text-primary); line-height: 1; }

    .r-grid-wrap {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 14px 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .r-grid-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-align: center;
      margin-bottom: 10px;
    }
    .r-grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 4px;
    }
    .r-grid > div {
      border-radius: 6px;
      padding: 5px 2px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .r-grid .rn { font-size: 11px; font-weight: 800; }
    .r-grid .rm { font-size: 9px; font-weight: 600; opacity: 0.9; }

    .r-retry-btn {
      width: 100%;
      padding: 15px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      border: none;
      border-radius: 12px;
      background: var(--primary);
      color: #fff;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(29,78,216,0.3);
      transition: all 0.15s;
    }
    .r-retry-btn:active { transform: scale(0.98); }

    img, iframe { pointer-events: auto; -webkit-user-drag: none; }
  </style>
</head>

      <div class="r-score-item">
        <div class="r-score-label">실기</div>

      <p class="r-grid-label">문항별 결과 &nbsp;·&nbsp; C: 정답 &nbsp;/&nbsp; M: 내 답</p>
      <div class="r-grid" id="r-grid"></div>
    </div>
    <button class="r-retry-btn" id="retry-btn">다시 풀기</button>

      { number:"모0575", question:"비말을 통해 공기 중으로 전파되고 발열, 오한, 인후통, 기침, 호흡곤란이 나타나며 감염 시 7일 이상 자가격리 필요한 감염성 질환은?", options:["결핵","옴","이","코로나-19","노로바이러스감염"], correctAnswer:4, videoId:"1119261392" },

      { number:"모0579", question:"의식을 잃은 대상자가 반응은 없으나 정상적인 호흡을 할 때 올바른 대처방법은?", options:["인공호흡을 실시한다.","가슴압박을 실시한다.","자동심장충격기를 사용한다.","옆으로 누운 자세를 취하게 한다.","반응할 때까지 어깨를 두드린다."], correctAnswer:4, videoId:"1119261608" },
      { number:"모0580", question:"치매에 걸린 아내를 돌보는 남편이 우울해하고 불안해할 때 요양보호사의 힘 돋우기 소통방법으로 옳은 것은?", options:["\"힘드시면 입주 간병인이라도 소개시켜 드릴까요?\"","\"기저귀를 채워보세요. 한결 수월해 질거예요.\"","\"누구나 겪고 있어요. 조그만 참아보세요.\"","\"힘들면 요양시설에 보내세요, 시설에 가면 나아질거예요.\"","\"언제든 도움이 필요하시면 말씀하세요. 최선을 다해 도와드리겠습니다.\""], correctAnswer:5, videoId:"1119261659" }
    ];

    const quizData = quizRawData.map(item => ({ ...item }));
    const TOTAL = quizData.length;
    let currentIndex = 0;
    let currentUserId = "";
    let userAnswers = new Array(TOTAL).fill(null);

    const quizPage = document.getElementById("quiz-page");
    const resultPage = document.getElementById("result-page");
    const videoSection = document.getElementById("video-section");
    const qNumber = document.getElementById("q-number");
    const qText = document.getElementById("q-text");
    const optionsDiv = document.getElementById("options");
    const currentQEl = document.getElementById("current-q");
    const totalQEl = document.getElementById("total-q");
    const prevBtn = document.getElementById("prev-btn");
    const nextBtn = document.getElementById("next-btn");
    const navSheetBtn = document.getElementById("nav-sheet-btn");
    const sheetOverlay = document.getElementById("sheet-overlay");
    const bottomSheet = document.getElementById("bottom-sheet");
    const sheetGrid = document.getElementById("sheet-grid");
    const progAnswered = document.getElementById("prog-answered");
    const progUnanswered = document.getElementById("prog-unanswered");

    totalQEl.textContent = TOTAL;

    function setVideo(videoId, title) {
      videoSection.innerHTML = `<iframe src="https://player.vimeo.com/video/${videoId}?title=0&byline=0&portrait=0&badge=0&autopause=0" allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share" title="${title}"></iframe>`;
    }

    function startQuiz(uid, uname) {
      currentUserId = uid;
      const userRef = database.ref(`exams/${EXAM_ID}/users/${uid}`);
      userRef.once("value").then(snap => {
        const data = snap.val();
        if (data && data.result) {
          showResult({ total: data.result.total, 필기: data.result.필기, 실기: data.result.실기, answers: data.result.answers || [], name: uname });
        } else if (data && data.progress) {
          currentIndex = data.progress.currentQuestion || 0;
          const raw = data.progress.answers || [];
          userAnswers = Array.from({length: TOTAL}, (_, i) => (raw[i] != null) ? raw[i] : null);
          showQuizPage();
        } else {
          currentIndex = 0;
          userAnswers = new Array(TOTAL).fill(null);
          showQuizPage();
        }
      }).catch(() => { showQuizPage(); });
    }

    function saveProgress() {
      if (!currentUserId) return;
      const normalized = userAnswers.map(a => (a != null) ? a : null);
      database.ref(`exams/${EXAM_ID}/users/${currentUserId}/progress`).set({ currentQuestion: currentIndex, answers: normalized });
    }

    function showQuizPage() {
      quizPage.style.display = "flex";
      resultPage.style.display = "none";
      buildSheetGrid();
      updateQuestion(currentIndex);
    }

    function updateQuestion(index) {
      currentIndex = index;
      const q = quizData[index];
      setVideo(q.videoId, q.number);
      qNumber.textContent = index + 1;
      qText.textContent = q.question;
      currentQEl.textContent = index + 1;
      const scroll = document.getElementById("quiz-scroll");
      if (scroll) scroll.scrollTop = 0;
      optionsDiv.innerHTML = "";
      q.options.forEach((opt, i) => {
        const label = document.createElement("label");
        label.className = "opt-label";
        label.innerHTML = `<input type="radio" name="answer" value="${i + 1}"><span>${opt}</span>`;
        optionsDiv.appendChild(label);
      });
      if (userAnswers[index] !== null) {
        const r = optionsDiv.querySelector(`input[value="${userAnswers[index]}"]`);
        if (r) r.checked = true;
      }
      prevBtn.disabled = (index === 0);
      if (index === TOTAL - 1) {
        nextBtn.textContent = "제출하기";
        nextBtn.classList.add("submit-mode");
      } else {
        nextBtn.textContent = "다음 →";
        nextBtn.classList.remove("submit-mode");
      }
      updateSheetGrid();
    }

    optionsDiv.addEventListener("change", e => {
      const val = parseInt(e.target.value);
      userAnswers[currentIndex] = val;
      saveProgress();
      updateSheetGrid();
      updateSheetProgress();
    });

    prevBtn.addEventListener("click", () => {
      if (currentIndex > 0) { updateQuestion(currentIndex - 1); saveProgress(); }
    });
    nextBtn.addEventListener("click", () => {
      if (currentIndex === TOTAL - 1) { submitQuiz(); }
      else { updateQuestion(currentIndex + 1); saveProgress(); }
    });

    function submitQuiz() {
      const unanswered = userAnswers.filter(a => a === null).length;
      if (unanswered > 0) {
        const go = confirm(`아직 답하지 않은 문항이 ${unanswered}개 있습니다.\n그래도 제출하시겠습니까?`);
        if (!go) return;
      }
      let 필기 = 0, 실기 = 0;
      quizData.forEach((item, i) => {
        if (userAnswers[i] && userAnswers[i] == item.correctAnswer) {
          if (i < 35) 필기++; else 실기++;
        }
      });
      const 총점 = 필기 + 실기;
      const uname = document.getElementById("user-name").value.trim();
      if (currentUserId) {
        const ref = database.ref(`exams/${EXAM_ID}/users/${currentUserId}`);
        ref.child("result").set({ total: 총점, 필기, 실기, answers: userAnswers });
        ref.child("progress").remove();
      }
      const googleFormURL = "https://docs.google.com/forms/d/e/1FAIpQLSdpxneZyV9yTdMvI-jaaIdkE50RdNuIHP161SFVk2m5rX8fQA/formResponse";
      const fd = new FormData();
      fd.append("entry.295783163", uname);
      fd.append("entry.516479247", `${총점}점 ( 필기: ${필기}점 / 실기: ${실기}점 )`);
      fetch(googleFormURL, { method: "POST", body: fd, mode: "no-cors" }).catch(console.error);
      try {
        if (window.opener && !window.opener.closed) {
          window.opener.postMessage({ type: "examResult", total: 총점, 필기, 실기, answers: userAnswers, correctAnswers: quizData.map(q => q.correctAnswer), name: uname, uid: currentUserId }, "*");
        }
      } catch(e) { console.error(e); }
      showResult({ total: 총점, 필기, 실기, answers: userAnswers, name: uname });
      try { window.close(); } catch(e) {}
    }

    function showResult(d) {
      quizPage.style.display = "none";
      resultPage.style.display = "flex";
      document.getElementById("r-name").textContent = "응시자 : " + d.name;
      document.getElementById("r-total").textContent = d.total + "점";
      document.getElementById("r-필기").textContent = d.필기 + "점";
      document.getElementById("r-실기").textContent = d.실기 + "점";
      const grid = document.getElementById("r-grid");
      grid.innerHTML = "";
      for (let i = 0; i < TOTAL; i++) {
        const ua = (d.answers[i] == null) ? "-" : d.answers[i];
        const ca = quizData[i].correctAnswer;
        const ok = ua !== "-" && parseInt(ua) === parseInt(ca);
        const cell = document.createElement("div");
        cell.style.background = ok ? "#ECFDF5" : "#FEF2F2";
        cell.style.border = ok ? "1.5px solid #6EE7B7" : "1.5px solid #FCA5A5";
        cell.style.color = ok ? "#059669" : "#DC2626";
        cell.innerHTML = `<div class="rn">${i+1}</div><div class="rm">C:${ca}/M:${ua}</div>`;
        grid.appendChild(cell);
      }
    }

    document.getElementById("retry-btn").addEventListener("click", () => {
      if (!currentUserId) { location.reload(); return; }
      const ref = database.ref(`exams/${EXAM_ID}/users/${currentUserId}`);
      ref.child("progress").remove().then(() => ref.child("result").remove()).then(() => {
        currentIndex = 0;
        userAnswers = new Array(TOTAL).fill(null);
        showQuizPage();
      });
    });

    function buildSheetGrid() {
      sheetGrid.innerHTML = "";
      for (let i = 0; i < TOTAL; i++) {
        const btn = document.createElement("div");
        btn.className = "sheet-nav-btn";
        btn.dataset.q = i;
        btn.innerHTML = `<div class="sn-num">${i+1}</div><div class="sn-ans"></div>`;
        btn.addEventListener("click", () => { updateQuestion(i); saveProgress(); closeSheet(); });
        sheetGrid.appendChild(btn);
      }
      updateSheetGrid();
      updateSheetProgress();
    }

    function updateSheetGrid() {
      const btns = sheetGrid.querySelectorAll(".sheet-nav-btn");
      btns.forEach((btn, i) => {
        btn.classList.remove("answered", "active-q");
        const ans = (userAnswers[i] != null) ? userAnswers[i] : null;
        const ansEl = btn.querySelector(".sn-ans");
        if (ans !== null) {
          btn.classList.add("answered");
          ansEl.textContent = "(" + ans + ")";
        } else {
          btn.style.background = "";
          btn.style.color = "";
          btn.style.borderColor = "";
          ansEl.textContent = "";
        }
        if (i === currentIndex) btn.classList.add("active-q");
      });
    }

    function updateSheetProgress() {
      const answered = userAnswers.filter(a => a != null).length;
      progAnswered.textContent = answered;
      progUnanswered.textContent = TOTAL - answered;
    }

    function openSheet() {
      sheetOverlay.classList.add("active");
      requestAnimationFrame(() => { sheetOverlay.classList.add("visible"); bottomSheet.classList.add("visible"); });
      updateSheetGrid();
      updateSheetProgress();
    }

    function closeSheet() {
      sheetOverlay.classList.remove("visible");
      bottomSheet.classList.remove("visible");
      setTimeout(() => sheetOverlay.classList.remove("active"), 280);
    }

    navSheetBtn.addEventListener("click", openSheet);
    sheetOverlay.addEventListener("click", closeSheet);
    document.getElementById("sheet-close-btn").addEventListener("click", closeSheet);

    document.addEventListener("dragstart", e => e.preventDefault());
    document.addEventListener("selectstart", e => { if (e.target.tagName !== "INPUT") e.preventDefault(); });
    document.addEventListener("contextmenu", e => e.preventDefault());

    (function() {
      const params = new URLSearchParams(window.location.search);
      const uid = params.get("uid") || "";
      const name = params.get("name") || "";
      document.getElementById("user-id").value = uid;
      document.getElementById("user-name").value = name;
      if (uid && name) { startQuiz(uid, name); }
      else {
        document.body.innerHTML = '<div style="display:flex;height:100vh;align-items:center;justify-content:center;font-family:sans-serif;text-align:center;padding:20px;color:#475569;"><div><div style="font-size:48px;margin-bottom:16px;">🔒</div><h2 style="font-size:20px;font-weight:700;color:#0F172A;margin-bottom:8px;">로그인이 필요합니다</h2><p style="font-size:14px;line-height:1.7;">올리사이트의 로그인 화면에서<br>아이디와 이름을 입력한 후 시작해주세요.</p></div></div>';
      }
    })();
  </script>
</body>
</html>
